<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desert Vendetta 76</title>
  <style>
    :root {
      --amber: #ffb347;
      --orange: #ff6b26;
      --red: #ef3e2f;
      --cream: #ffe1a6;
      --ink: #170f0c;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #080605;
      color: var(--cream);
      font-family: "Trebuchet MS", Arial, sans-serif;
      user-select: none;
    }
    canvas { display: block; }
    #game { position: fixed; inset: 0; overflow: hidden; }
    #game canvas {
      transform: scale(1.003);
      transform-origin: center;
    }

    #speedEffect {
      position: fixed;
      inset: -8%;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 50% 52%, transparent 30%, rgba(95,205,255,.05) 62%, rgba(195,239,255,.16) 100%),
        repeating-conic-gradient(
          from 0deg at 50% 52%,
          transparent 0deg 5.7deg,
          rgba(202,239,255,.16) 5.8deg 6deg,
          transparent 6.1deg 11.8deg
        );
      -webkit-mask-image: radial-gradient(circle at 50% 52%, transparent 0 28%, rgba(0,0,0,.18) 48%, #000 100%);
      mask-image: radial-gradient(circle at 50% 52%, transparent 0 28%, rgba(0,0,0,.18) 48%, #000 100%);
      mix-blend-mode: screen;
      filter: blur(1.1px);
      transform: scale(1.04);
      transform-origin: 50% 52%;
      will-change: opacity, transform;
    }

    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 7;
      background:
        radial-gradient(circle at center, transparent 45%, rgba(15,6,2,.22) 72%, rgba(4,2,1,.72) 100%),
        repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 3px);
      mix-blend-mode: multiply;
    }

    #hud {
      position: fixed;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      opacity: 0;
      transition: opacity .35s ease;
      text-shadow: 0 2px 4px #000;
    }
    #hud.visible { opacity: 1; }

    .panel {
      background: rgba(13, 9, 6, .56);
      border: 1px solid rgba(255, 190, 112, .20);
      box-shadow: 0 2px 12px rgba(0, 0, 0, .26);
      backdrop-filter: blur(3px);
      border-radius: 3px;
    }

    #topLeftCluster {
      position: absolute;
      top: 14px;
      left: 14px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    #topLeft {
      width: 132px;
      height: 132px;
      padding: 9px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    #topRight {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 150px;
      padding: 7px 9px;
      display: grid;
      gap: 4px;
    }
    #bottomLeft {
      position: absolute;
      left: 14px;
      bottom: 14px;
      min-width: 102px;
      padding: 5px 8px 4px;
      display: flex;
      align-items: baseline;
      gap: 5px;
    }
    #bottomRight {
      position: absolute;
      right: 14px;
      bottom: 14px;
      min-width: 56px;
      padding: 6px 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .statusItem + .statusItem { margin-top: 7px; }
    .labelRow {
      display: flex;
      justify-content: space-between;
      margin: 0;
      font-size: 8px;
      line-height: 1;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: rgba(255, 232, 194, .78);
    }
    .bar {
      height: 4px;
      margin-top: 3px;
      background: rgba(0, 0, 0, .58);
      overflow: hidden;
      border-radius: 2px;
    }
    .fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #cf2d22, #ff7b2d, #ffd166);
      transition: width .12s linear;
    }
    #heatFill { background: linear-gradient(90deg, #d66a1a, #ffd166, #fff0c1); }
    #boostFill { background: linear-gradient(90deg, #266f8c, #53d5ff, #c9f5ff); }

    .hudStat {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      font-size: 9px;
      line-height: 1;
      letter-spacing: .09em;
      color: rgba(255, 225, 178, .72);
    }
    .hudStat strong {
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: 17px;
      font-weight: 400;
      letter-spacing: .04em;
      color: #fff0bd;
    }
    #score { color: var(--amber); }

    #speed {
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      color: white;
      font-size: 28px;
      line-height: .9;
      letter-spacing: .03em;
    }
    #speedUnit {
      color: var(--amber);
      font-size: 9px;
      line-height: 1;
      letter-spacing: .11em;
    }
    .rocketIcon {
      width: 18px;
      height: 18px;
      color: #fff0bd;
      filter: drop-shadow(0 1px 2px #000);
    }
    #ammo {
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: 18px;
      line-height: 1;
      color: var(--amber);
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 26px;
      height: 26px;
      transform: translate(-50%, -50%);
      opacity: .62;
      transition: opacity .16s ease;
    }
    #crosshair.hidden { display: none; }
    #crosshair::before, #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,224,160,.86);
      box-shadow: 0 0 4px rgba(255,120,35,.58);
    }
    #crosshair::before { width: 26px; height: 1px; top: 12px; left: 0; }
    #crosshair::after { width: 1px; height: 26px; left: 12px; top: 0; }
    #crosshair span {
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(255,224,160,.76);
      border-radius: 50%;
    }

    #minimap {
      width: 132px;
      height: 132px;
      border: 1px solid rgba(255, 190, 112, .20);
      border-radius: 3px;
      background: rgba(13, 9, 6, .64);
      box-shadow: 0 2px 12px rgba(0, 0, 0, .26), inset 0 0 18px rgba(0, 0, 0, .7);
    }

    #message {
      position: absolute;
      left: 50%;
      top: 15%;
      transform: translateX(-50%);
      font-family: Impact, sans-serif;
      font-size: clamp(20px, 2.8vw, 38px);
      letter-spacing: .07em;
      text-align: center;
      color: #fff0c4;
      opacity: 0;
      transition: opacity .25s;
      text-shadow: 0 2px 0 #9e2f1e, 0 5px 16px #000;
    }
    #message.show { opacity: 1; }

    #damageFlash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 8;
      background: radial-gradient(circle, transparent 30%, rgba(255,28,0,.54) 100%);
      opacity: 0;
      transition: opacity .1s;
    }

    #startScreen, #gameOver {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      overflow-y: auto;
      background:
        linear-gradient(180deg, rgba(18,7,3,.32), rgba(4,2,1,.92)),
        radial-gradient(circle at 72% 26%, rgba(255,97,25,.28), transparent 35%);
    }
    #gameOver { display: none; }
    .hero {
      width: min(820px, calc(100vw - 40px));
      max-height: 94vh;
      overflow-y: auto;
      padding: clamp(14px, 3.5vh, 38px) clamp(16px, 4vw, 42px);
      border: 1px solid rgba(255,169,70,.35);
      background: linear-gradient(135deg, rgba(31,13,5,.90), rgba(8,5,3,.86));
      box-shadow: 0 24px 90px rgba(0,0,0,.7), inset 0 0 70px rgba(255,81,19,.06);
      clip-path: polygon(0 0, 94% 0, 100% 12%, 100% 100%, 6% 100%, 0 88%);
    }
    .eyebrow {
      color: var(--amber);
      text-transform: uppercase;
      letter-spacing: .36em;
      font-size: clamp(10px, 1.5vh, 12px);
    }
    h1 {
      margin: 4px 0 0;
      font-family: Impact, Haettenschweiler, sans-serif;
      font-weight: 400;
      font-size: clamp(38px, min(9vw, 13vh), 104px);
      letter-spacing: .015em;
      line-height: .88;
      color: #fff0bd;
      text-shadow: 0 6px 0 #a42f1b, 0 12px 34px #000;
    }
    h1 em { color: var(--orange); font-style: normal; }
    .subtitle {
      margin: clamp(8px,1.8vh,20px) 0 clamp(10px,2.2vh,24px);
      max-width: 670px;
      color: #e6c79e;
      line-height: 1.4;
      font-size: clamp(11px, 1.8vh, 15px);
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(4px, 1vh, 10px);
      margin: clamp(10px, 2vh, 22px) 0 clamp(12px, 2.4vh, 26px);
    }
    .control {
      padding: clamp(5px, 0.9vh, 10px) clamp(6px, 1vw, 12px);
      border-left: 2px solid var(--orange);
      background: rgba(255,255,255,.035);
      font-size: clamp(9px, 1.4vh, 12px);
      color: #e8ceb0;
    }
    .control b { color: white; display: block; margin-bottom: 3px; }
    button {
      pointer-events: auto;
      cursor: pointer;
      border: 0;
      padding: clamp(8px,1.2vh,13px) clamp(16px,2.2vw,24px);
      font-family: Impact, sans-serif;
      font-size: clamp(16px, 2.5vh, 22px);
      letter-spacing: .12em;
      color: #1a0c04;
      background: linear-gradient(180deg, #ffd06d, #ff7b2d);
      box-shadow: 0 5px 0 #8e2c1a, 0 10px 25px rgba(0,0,0,.5);
      clip-path: polygon(0 0, 92% 0, 100% 30%, 100% 100%, 8% 100%, 0 70%);
    }
    button:hover { filter: brightness(1.12); transform: translateY(-1px); }
    .small { font-size: clamp(9px, 1.3vh, 11px); opacity: .62; margin-top: clamp(8px, 1.6vh, 18px); }

    #roundTimer {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 64px;
      padding: 4px 8px 3px;
      text-align: center;
    }
    #timerText {
      display: block;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: 16px;
      line-height: 1;
      letter-spacing: .07em;
      color: #fff0bd;
    }

    .menuHero {
      min-height: min(540px, calc(100vh - 40px));
      display: flex;
      flex-direction: column;
    }
    .menuTitle { margin-top: clamp(14px, 2vh, 18px); }
    .menuActions {
      width: min(360px, 100%);
      margin: auto auto 0;
      display: grid;
      justify-items: center;
      gap: 18px;
      padding: 36px 0 22px;
    }
    #startButton { min-width: 190px; }
    .menuOptions {
      display: grid;
      gap: 12px;
      width: 100%;
    }
    .menuOption {
      display: grid;
      gap: 6px;
      width: 100%;
    }
    .optionLabel {
      color: rgba(255,225,166,.72);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .18em;
      text-align: center;
      text-transform: uppercase;
    }
    .roundPicker {
      display: grid;
      grid-template-columns: 42px minmax(150px, 1fr) 42px;
      align-items: center;
      gap: 10px;
      width: 100%;
    }
    .roundValue {
      min-height: 42px;
      display: grid;
      place-items: center;
      padding: 8px 12px;
      border: 1px solid rgba(255,179,71,.34);
      background: rgba(255,255,255,.035);
      color: #ffe1a6;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .12em;
      text-align: center;
      text-transform: uppercase;
    }
    .timeArrow {
      width: 42px;
      height: 42px;
      padding: 0;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      font-size: 24px;
      line-height: 1;
      letter-spacing: 0;
      clip-path: polygon(0 0, 78% 0, 100% 22%, 100% 100%, 22% 100%, 0 78%);
    }
    .timeArrow:last-child { transform: scaleX(-1); }
    .timeArrow:last-child:hover { transform: scaleX(-1) translateY(-1px); }
    .timeArrow span { transform: scaleX(1); }
    .timeArrow:last-child span { transform: scaleX(-1); }

    @media (max-width: 760px) {
      .controls { grid-template-columns: 1fr 1fr; }
      #topLeftCluster { top: 10px; left: 10px; gap: 6px; }
      #topLeft, #minimap { width: 112px; height: 112px; }
      #topLeft { padding: 7px 8px; }
      .statusItem + .statusItem { margin-top: 5px; }
      .labelRow { font-size: 7px; }
      #topRight { top: 10px; right: 10px; width: 132px; padding: 6px 8px; }
      #bottomLeft { left: 10px; bottom: 10px; }
      #bottomRight { right: 10px; bottom: 10px; }
      .hero { padding: 28px; }
      #roundTimer { top: 10px; }
      #timerText { font-size: 15px; }
    }
    /* Short viewport: compact layout for wide/landscape screens */
    @media (max-height: 500px) {
      .hero { padding: 10px 18px; }
      h1 { font-size: clamp(26px, min(7vw, 12vh), 60px); }
      .subtitle { margin: 6px 0 8px; font-size: 10px; line-height: 1.3; }
      .controls { gap: 3px; margin: 8px 0 10px; grid-template-columns: repeat(6, 1fr); }
      .control { padding: 4px 5px; font-size: 8px; }
      .control b { margin-bottom: 1px; }
      button { padding: 6px 14px; font-size: 15px; }
      .small { display: none; }
      .eyebrow { font-size: 9px; letter-spacing: .2em; }
      .menuHero { min-height: calc(100vh - 20px); }
      .menuTitle { margin-top: 4px; }
      .menuActions { gap: 10px; padding: 8px 0 4px; }
      .menuOptions { gap: 7px; }
      .menuOption { gap: 3px; }
      .optionLabel { font-size: 8px; }
      .roundPicker { grid-template-columns: 36px minmax(130px, 1fr) 36px; gap: 7px; }
      .timeArrow { width: 36px; height: 36px; font-size: 20px; }
      .roundValue { min-height: 36px; padding: 5px 8px; font-size: 11px; }
      #topLeftCluster { top: 8px; left: 8px; gap: 5px; }
      #topLeft, #minimap { width: 96px; height: 96px; }
      #topLeft { padding: 6px; }
      .statusItem + .statusItem { margin-top: 3px; }
      .labelRow { font-size: 6.5px; }
      .bar { height: 3px; margin-top: 2px; }
      #topRight { top: 8px; right: 8px; width: 122px; }
      #bottomLeft { left: 8px; bottom: 8px; }
      #bottomRight { right: 8px; bottom: 8px; }
      #roundTimer { top: 8px; }
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="speedEffect"></div>
  <div id="vignette"></div>
  <div id="damageFlash"></div>

  <div id="hud">
    <div id="topLeftCluster">
      <div id="topLeft" class="panel" aria-label="Spielerstatus">
        <div class="statusItem">
          <div class="labelRow"><span>Armor</span><span id="armorText">100%</span></div>
          <div class="bar"><div id="armorFill" class="fill"></div></div>
        </div>
        <div class="statusItem">
          <div class="labelRow"><span>Heat</span><span id="heatText">0%</span></div>
          <div class="bar"><div id="heatFill" class="fill" style="width:0%"></div></div>
        </div>
        <div class="statusItem">
          <div class="labelRow"><span>Nitro</span><span id="boostText">100%</span></div>
          <div class="bar"><div id="boostFill" class="fill"></div></div>
        </div>
      </div>
      <canvas id="minimap" width="190" height="190" aria-label="Radar"></canvas>
    </div>

    <div id="topRight" class="panel">
      <div class="hudStat"><span>SCORE</span><strong id="score">000000</strong></div>
      <div class="hudStat"><span>HOSTILES</span><strong id="hostiles">0</strong></div>
    </div>

    <div id="bottomLeft" class="panel" aria-label="Geschwindigkeit">
      <span id="speed">000</span>
      <span id="speedUnit">KM/H</span>
    </div>

    <div id="bottomRight" class="panel" aria-label="Raketen">
      <svg class="rocketIcon" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" d="M14.8 3.2c2.5-2.5 5.8-2.2 5.8-2.2s.3 3.3-2.2 5.8l-2.5 2.5.4 3.4-2.2 2.2-1.8-2.7-3.1 3.1.5 2.2-1.5 1.5-1.7-3-3-1.7L5 12.8l2.2.5 3.1-3.1-2.7-1.8 2.2-2.2 3.4.4 2.6-2.4Z"/>
      </svg>
      <span id="ammo">6</span>
    </div>

    <div id="crosshair"><span></span></div>
    <div id="message"></div>
    <div id="roundTimer" class="panel"><span id="timerText">03:00</span></div>
  </div>

  <div id="startScreen">
    <div class="hero menuHero">
      <h1 class="menuTitle">DESERT<br><em>VENDETTA 76</em></h1>
      <div class="menuActions">
        <button id="startButton">START</button>
        <div class="menuOptions">
          <div class="menuOption">
            <div class="optionLabel">RUNDENZEIT</div>
            <div class="roundPicker" aria-label="Rundenzeit auswählen">
              <button id="roundPrev" class="timeArrow" type="button" aria-label="Kürzere Rundenzeit"><span>‹</span></button>
              <div id="roundTimeValue" class="roundValue">3 MINUTEN</div>
              <button id="roundNext" class="timeArrow" type="button" aria-label="Längere Rundenzeit"><span>›</span></button>
            </div>
          </div>
          <div class="menuOption">
            <div class="optionLabel">GEGNER PRO WELLE</div>
            <div class="roundPicker" aria-label="Gegner pro Welle auswählen">
              <button id="enemyWavePrev" class="timeArrow" type="button" aria-label="Weniger Gegner"><span>‹</span></button>
              <div id="enemyWaveValue" class="roundValue">4 GEGNER</div>
              <button id="enemyWaveNext" class="timeArrow" type="button" aria-label="Mehr Gegner"><span>›</span></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="gameOver">
    <div class="hero" style="max-width:620px;text-align:center">
      <div class="eyebrow">ROUND COMPLETE</div>
      <h1 style="font-size:70px">TIME'S UP</h1>
      <p id="finalScore" class="subtitle" style="margin-left:auto;margin-right:auto"></p>
      <button id="restartButton">NOCHMAL</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="sound-engine.js"></script>
  <script>
  (() => {
    "use strict";

    const clamp = THREE.MathUtils.clamp;
    const lerp = THREE.MathUtils.lerp;
    const rand = (a, b) => a + Math.random() * (b - a);
    const TAU = Math.PI * 2;
    const TERRAIN_FLAT_ZONES = [
      [0, 0, 32, 34],
      [-105, -55, 30, 32],
      [365, -278, 40, 34],
      [-352, 280, 34, 32],
      [310, 265, 32, 30],
    ];

    function rawTerrainHeight(x, z) {
      const broadWaves =
        Math.sin((x + 35) * .0105) * 2.7 +
        Math.cos((z - 70) * .0120) * 2.2 +
        Math.sin((x + z) * .0075) * 1.55 +
        Math.sin((x - z * .55) * .0160) * .75;
      const hillWest = 4.1 * Math.exp(-((x + 205) ** 2 + (z + 155) ** 2) / 30000);
      const hillEast = 3.4 * Math.exp(-((x - 235) ** 2 + (z + 235) ** 2) / 25000);
      const basinNorth = -4.0 * Math.exp(-((x - 165) ** 2 + (z - 175) ** 2) / 23000);
      return broadWaves + hillWest + hillEast + basinNorth;
    }

    const TERRAIN_ORIGIN_HEIGHT = rawTerrainHeight(0, 0);

    function terrainHeight(x, z) {
      let height = rawTerrainHeight(x, z) - TERRAIN_ORIGIN_HEIGHT;
      for (const [flatX, flatZ, radius, blend] of TERRAIN_FLAT_ZONES) {
        const distance = Math.hypot(x - flatX, z - flatZ);
        const t = clamp((distance - radius) / blend, 0, 1);
        const smooth = t * t * (3 - 2 * t);
        const flatHeight = rawTerrainHeight(flatX, flatZ) - TERRAIN_ORIGIN_HEIGHT;
        height = lerp(flatHeight, height, smooth);
      }
      return height;
    }

    function terrainNormalAt(x, z, out = new THREE.Vector3()) {
      const sample = 2.5;
      const dx = terrainHeight(x - sample, z) - terrainHeight(x + sample, z);
      const dz = terrainHeight(x, z - sample) - terrainHeight(x, z + sample);
      return out.set(dx, sample * 2, dz).normalize();
    }

    const ui = {
      hud: document.getElementById("hud"),
      armorFill: document.getElementById("armorFill"),
      armorText: document.getElementById("armorText"),
      heatFill: document.getElementById("heatFill"),
      heatText: document.getElementById("heatText"),
      boostFill: document.getElementById("boostFill"),
      boostText: document.getElementById("boostText"),
      speed: document.getElementById("speed"),
      score: document.getElementById("score"),
      hostiles: document.getElementById("hostiles"),
      ammo: document.getElementById("ammo"),
      crosshair: document.getElementById("crosshair"),
      message: document.getElementById("message"),
      damageFlash: document.getElementById("damageFlash"),
      speedEffect: document.getElementById("speedEffect"),
      startScreen: document.getElementById("startScreen"),
      gameOver: document.getElementById("gameOver"),
      finalScore: document.getElementById("finalScore"),
      minimap: document.getElementById("minimap"),
      timerText: document.getElementById("timerText"),
      roundTimeValue: document.getElementById("roundTimeValue"),
      roundPrev: document.getElementById("roundPrev"),
      roundNext: document.getElementById("roundNext"),
      enemyWaveValue: document.getElementById("enemyWaveValue"),
      enemyWavePrev: document.getElementById("enemyWavePrev"),
      enemyWaveNext: document.getElementById("enemyWaveNext"),
    };

    let scene, camera, renderer, clock;
    let sunLight, sunTarget;
    let mirrorCamera, mirrorRenderTarget, mirrorSurface;
    let mirrorUpdateAccumulator = 1;
    let shadowUpdateAccumulator = 1;
    let hudUpdateAccumulator = 1;
    let minimapUpdateAccumulator = 1;
    let audioUpdateAccumulator = 1;
    let updateAudioThisFrame = true;
    let simulationFrame = 0;
    let lastNitroOpacity = "";
    let lastNitroTransform = "";

    function rebuildObstacleGrid() {
      obstacleGrid.clear();
      for (const obstacle of world.obstacles) {
        const radius = Math.max(.1, obstacle.radius || 0);
        const minX = Math.floor((obstacle.pos.x - radius) / OBSTACLE_GRID_SIZE);
        const maxX = Math.floor((obstacle.pos.x + radius) / OBSTACLE_GRID_SIZE);
        const minZ = Math.floor((obstacle.pos.z - radius) / OBSTACLE_GRID_SIZE);
        const maxZ = Math.floor((obstacle.pos.z + radius) / OBSTACLE_GRID_SIZE);
        for (let cellX = minX; cellX <= maxX; cellX++) {
          for (let cellZ = minZ; cellZ <= maxZ; cellZ++) {
            const key = obstacleGridKey(cellX, cellZ);
            let cell = obstacleGrid.get(key);
            if (!cell) obstacleGrid.set(key, cell = []);
            cell.push(obstacle);
          }
        }
      }
    }

    function forEachObstacleInBounds(minX, minZ, maxX, maxZ, callback) {
      const queryId = ++obstacleQueryId;
      const firstX = Math.floor(minX / OBSTACLE_GRID_SIZE);
      const lastX = Math.floor(maxX / OBSTACLE_GRID_SIZE);
      const firstZ = Math.floor(minZ / OBSTACLE_GRID_SIZE);
      const lastZ = Math.floor(maxZ / OBSTACLE_GRID_SIZE);
      for (let cellX = firstX; cellX <= lastX; cellX++) {
        for (let cellZ = firstZ; cellZ <= lastZ; cellZ++) {
          const cell = obstacleGrid.get(obstacleGridKey(cellX, cellZ));
          if (!cell) continue;
          for (const obstacle of cell) {
            if (obstacle._queryId === queryId) continue;
            obstacle._queryId = queryId;
            callback(obstacle);
          }
        }
      }
    }

    function alignVehicleToTerrain(vehicle, snap = false) {
      if (!vehicle.group) return;
      vehicle.pos.y = terrainHeight(vehicle.pos.x, vehicle.pos.z);
      terrainNormalAt(vehicle.pos.x, vehicle.pos.z, terrainNormal);
      terrainForward.set(-Math.sin(vehicle.yaw), 0, -Math.cos(vehicle.yaw))
        .addScaledVector(terrainNormal, -terrainForward.dot(terrainNormal))
        .normalize();
      terrainRight.crossVectors(terrainForward, terrainNormal).normalize();
      terrainForward.crossVectors(terrainNormal, terrainRight).normalize();
      terrainBack.copy(terrainForward).multiplyScalar(-1);
      terrainBasis.makeBasis(terrainRight, terrainNormal, terrainBack);
      terrainQuaternion.setFromRotationMatrix(terrainBasis);
      if (snap) vehicle.group.quaternion.copy(terrainQuaternion);
      else vehicle.group.quaternion.slerp(terrainQuaternion, .32);
    }

    function makeNoiseTexture(size = 256, base = [180, 105, 48]) {
      const c = document.createElement("canvas");
      c.width = c.height = size;
      const ctx = c.getContext("2d");
      const img = ctx.createImageData(size, size);
      for (let i = 0; i < img.data.length; i += 4) {
        const n = rand(-28, 28);
        img.data[i] = clamp(base[0] + n, 0, 255);
        img.data[i + 1] = clamp(base[1] + n * .75, 0, 255);
        img.data[i + 2] = clamp(base[2] + n * .48, 0, 255);
        img.data[i + 3] = 255;
      }
      ctx.putImageData(img, 0, 0);
      const texture = new THREE.CanvasTexture(c);
      texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(36, 36);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function makeRoadTexture() {

    function mergeMeshGeometry(entries, root = null) {
      if (!entries.length) return null;
      const rootInverse = root
        ? tempInverseMatrix.copy(root.matrixWorld).invert().clone()
        : null;
      const geometries = [];
      let vertexCount = 0;
      let includeNormals = true;
      let includeUvs = true;

      for (const mesh of entries) {
        let geometry = mesh.geometry.clone();
        const transform = rootInverse
          ? tempMatrix.multiplyMatrices(rootInverse, mesh.matrixWorld).clone()
          : mesh.matrixWorld;
        geometry.applyMatrix4(transform);
        if (geometry.index) geometry = geometry.toNonIndexed();
        const position = geometry.getAttribute("position");
        if (!position) continue;
        vertexCount += position.count;
        includeNormals &&= !!geometry.getAttribute("normal");
        includeUvs &&= !!geometry.getAttribute("uv");
        geometries.push(geometry);
      }
      if (!geometries.length) return null;

      const positions = new Float32Array(vertexCount * 3);
      const normals = includeNormals ? new Float32Array(vertexCount * 3) : null;
      const uvs = includeUvs ? new Float32Array(vertexCount * 2) : null;
      let positionOffset = 0;
      let normalOffset = 0;
      let uvOffset = 0;
      for (const geometry of geometries) {
        const position = geometry.getAttribute("position");
        positions.set(position.array, positionOffset);
        positionOffset += position.array.length;
        if (normals) {
          const normal = geometry.getAttribute("normal");
          normals.set(normal.array, normalOffset);
          normalOffset += normal.array.length;
        }
        if (uvs) {
          const uv = geometry.getAttribute("uv");
          uvs.set(uv.array, uvOffset);
          uvOffset += uv.array.length;
        }
        geometry.dispose();
      }

      const merged = new THREE.BufferGeometry();
      merged.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      if (normals) merged.setAttribute("normal", new THREE.BufferAttribute(normals, 3));
      else merged.computeVertexNormals();
      if (uvs) merged.setAttribute("uv", new THREE.BufferAttribute(uvs, 2));
      merged.computeBoundingBox();
      merged.computeBoundingSphere();
      return merged;
    }

    function materialBatchKey(material) {
      return [
        material.type,
        material.color?.getHexString() || "",
        material.emissive?.getHexString() || "",
        material.emissiveIntensity || 0,
        material.roughness ?? "",
        material.metalness ?? "",
        material.map?.uuid || "",
        material.alphaMap?.uuid || "",
        material.transparent ? 1 : 0,
        material.opacity,
        material.depthWrite ? 1 : 0,
        material.depthTest ? 1 : 0,
        material.side,
        material.flatShading ? 1 : 0,
        material.polygonOffset ? 1 : 0,
        material.polygonOffsetFactor || 0,
        material.polygonOffsetUnits || 0,
        material.alphaTest || 0,
      ].join("|");
    }

    function batchStaticWorld() {
      scene.updateMatrixWorld(true);
      const destructibleRoots = new Set(
        world.obstacles.filter(obstacle => obstacle.destructible).map(obstacle => obstacle.mesh)
      );
      const isDestructiblePart = object => {
        for (let current = object; current && current !== scene; current = current.parent) {
          if (destructibleRoots.has(current)) return true;
        }
        return false;
      };
      const groups = new Map();
      const worldPosition = new THREE.Vector3();

      scene.traverse(object => {
        if (!object.isMesh || !object.visible || !object.geometry ||
            Array.isArray(object.material) || object.material.isShaderMaterial ||
            object.material.transparent || object.renderOrder !== 0 ||
            isDestructiblePart(object)) return;
        object.getWorldPosition(worldPosition);
        const cellX = Math.floor(worldPosition.x / 160);
        const cellZ = Math.floor(worldPosition.z / 160);
        const key = [
          cellX,
          cellZ,
          object.castShadow ? 1 : 0,
          object.receiveShadow ? 1 : 0,
          materialBatchKey(object.material),
        ].join("::");
        let group = groups.get(key);
        if (!group) groups.set(key, group = {
          meshes: [],
          material: object.material,
          castShadow: object.castShadow,
          receiveShadow: object.receiveShadow,
        });
        group.meshes.push(object);
      });

      let sourceMeshes = 0;
      let batches = 0;
      for (const group of groups.values()) {
        if (group.meshes.length < 2) continue;
        const geometry = mergeMeshGeometry(group.meshes);
        if (!geometry) continue;
        const batch = new THREE.Mesh(geometry, group.material);
        batch.name = "StaticWorldBatch";
        batch.castShadow = group.castShadow;
        batch.receiveShadow = group.receiveShadow;
        batch.matrixAutoUpdate = false;
        scene.add(batch);
        for (const mesh of group.meshes) mesh.removeFromParent();
        sourceMeshes += group.meshes.length;
        batches++;
      }
      return { sourceMeshes, batches };
    }

    function batchDestructibleObjects() {
      const roots = new Set(
        world.obstacles.filter(obstacle => obstacle.destructible).map(obstacle => obstacle.mesh)
      );
      let sourceMeshes = 0;
      let batches = 0;
      for (const root of roots) {
        root.updateMatrixWorld(true);
        const groups = new Map();
        root.traverse(object => {
          if (object === root || !object.isMesh || !object.visible ||
              !object.geometry || Array.isArray(object.material)) return;
          const key = [
            object.material.uuid,
            object.castShadow ? 1 : 0,
            object.receiveShadow ? 1 : 0,
          ].join("|");
          let group = groups.get(key);
          if (!group) groups.set(key, group = {
            meshes: [],
            material: object.material,
            castShadow: object.castShadow,
            receiveShadow: object.receiveShadow,
          });
          group.meshes.push(object);
        });
        for (const group of groups.values()) {
          if (group.meshes.length < 2) continue;
          const geometry = mergeMeshGeometry(group.meshes, root);
          if (!geometry) continue;
          const batch = new THREE.Mesh(geometry, group.material);
          batch.name = "DestructibleBatch";
          batch.castShadow = group.castShadow;
          batch.receiveShadow = group.receiveShadow;
          batch.userData.renderBatch = true;
          root.add(batch);
          for (const mesh of group.meshes) {
            mesh.visible = false;
            mesh.userData.shatterSource = true;
          }
          sourceMeshes += group.meshes.length;
          batches++;
        }
      }
      return { sourceMeshes, batches };
    }

    function batchVehicleMeshes(bodyPivot, protectedObjects) {
      bodyPivot.updateMatrixWorld(true);
      const protectedRoots = new Set(protectedObjects.filter(Boolean));
      const isProtected = object => {
        for (let current = object; current && current !== bodyPivot; current = current.parent) {
          if (protectedRoots.has(current)) return true;
        }
        return protectedRoots.has(bodyPivot);
      };
      const groups = new Map();
      bodyPivot.traverse(object => {
        if (!object.isMesh || !object.visible || !object.geometry ||
            Array.isArray(object.material) || isProtected(object)) return;
        const key = [
          object.material.uuid,
          object.castShadow ? 1 : 0,
          object.receiveShadow ? 1 : 0,
        ].join("|");
        let group = groups.get(key);
        if (!group) groups.set(key, group = {
          meshes: [],
          material: object.material,
          castShadow: object.castShadow,
          receiveShadow: object.receiveShadow,
        });
        group.meshes.push(object);
      });

      for (const group of groups.values()) {
        if (group.meshes.length < 2) continue;
        const geometry = mergeMeshGeometry(group.meshes, bodyPivot);
        if (!geometry) continue;
        const batch = new THREE.Mesh(geometry, group.material);
        batch.name = "VehicleBatch";
        batch.castShadow = group.castShadow;
        batch.receiveShadow = group.receiveShadow;
        bodyPivot.add(batch);
        for (const mesh of group.meshes) mesh.removeFromParent();
      }
    }

    function refreshWheelInstances(wheels) {
      if (!wheels.length) return;
      const tireInstances = wheels[0].tireInstances;
      const rimInstances = wheels[0].rimInstances;
      tempObject.position.set(0, 0, 0);
      tempObject.scale.set(1, 1, 1);
      for (const wheel of wheels) {
        wheel.pivot.updateMatrix();

        tempEuler.set(wheel.spin, 0, Math.PI / 2);
        tempObject.quaternion.setFromEuler(tempEuler);
        tempObject.updateMatrix();
        tempMatrix.multiplyMatrices(wheel.pivot.matrix, tempObject.matrix);
        tireInstances.setMatrixAt(wheel.index, tempMatrix);

        tempEuler.set(0, 0, Math.PI / 2);
        tempObject.quaternion.setFromEuler(tempEuler);
        tempObject.updateMatrix();
        tempMatrix.multiplyMatrices(wheel.pivot.matrix, tempObject.matrix);
        rimInstances.setMatrixAt(wheel.index, tempMatrix);
      }
      tireInstances.instanceMatrix.needsUpdate = true;
      rimInstances.instanceMatrix.needsUpdate = true;
    }

    function createFlashLightPool(capacity) {
      for (let i = 0; i < capacity; i++) {
        const light = new THREE.PointLight(0xffffff, 0, 1, 2);

        scene.add(light);
        world.lights.push({ light, life: 0 });

    function flashLight(color, intensity, distance, life, position) {
      if (!world.lights.length) return;
      let entry = null;
      for (let i = 0; i < world.lights.length; i++) {
        const candidate = world.lights[(flashLightCursor + i) % world.lights.length];
        if (candidate.life <= 0) {
          entry = candidate;
          flashLightCursor = (flashLightCursor + i + 1) % world.lights.length;
          break;
        }
        if (!entry || candidate.life < entry.life) entry = candidate;
      }
      entry.light.color.setHex(color);
      entry.light.intensity = intensity;
      entry.light.distance = distance;
      entry.light.decay = 2;
      entry.light.position.copy(position);
      entry.life = life;
    }


    function createJaggedRockGeometry(width, depth, height, tiers = 5, points = 11, plateau = false) {
      const vertices = [];
      const indices = [];
      const rings = [];
      const angleJitter = Array.from({ length: points }, () => rand(-0.12, 0.12));
      const radialJitter = Array.from({ length: points }, () => rand(.72, 1.22));
      const leanX = rand(-width * .16, width * .16);
      const leanZ = rand(-depth * .16, depth * .16);

      for (let level = 0; level <= tiers; level++) {
        const t = level / tiers;
        let scale;
        if (plateau) {
          const terrace = [1, .92, .80, .70, .60, .54][Math.min(level, 5)];
          scale = terrace ?? lerp(1, .52, t);
        } else {
          scale = Math.max(.035, Math.pow(1 - t, .78));
        }

        rings.push(vertices.length / 3);
        for (let i = 0; i < points; i++) {
          const a = i / points * TAU + angleJitter[i];
          const cliffBreak = 1 + Math.sin(a * 3 + level * 1.7) * .10 + Math.sin(a * 7 - level) * .06;
          const r = radialJitter[i] * cliffBreak;
          const shelf = plateau && level > 0 && level < tiers && level % 2 === 0 ? 1.12 : 1;
          vertices.push(
            Math.cos(a) * width * scale * r * shelf + leanX * t,
            height * t + rand(-height * .018, height * .018),
            Math.sin(a) * depth * scale * r * shelf + leanZ * t
          );
        }
      }

      for (let level = 0; level < tiers; level++) {
        const a0 = rings[level];
        const a1 = rings[level + 1];
        for (let i = 0; i < points; i++) {
          const j = (i + 1) % points;
          if ((i + level) % 2 === 0) {
            indices.push(a0 + i, a1 + i, a0 + j, a0 + j, a1 + i, a1 + j);
          } else {
            indices.push(a0 + i, a1 + i, a1 + j, a0 + i, a1 + j, a0 + j);
          }
        }
      }

      const topCenter = vertices.length / 3;
      vertices.push(leanX, height, leanZ);
      const topRing = rings[tiers];
      for (let i = 0; i < points; i++) {
        const j = (i + 1) % points;
        indices.push(topCenter, topRing + i, topRing + j);
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();
      return geometry;
    }

    function createRockFormation(x, z, width, height, material, flatTop = false, distant = false) {
      const group = new THREE.Group();
      const pieces = flatTop ? Math.floor(rand(4, 7)) : Math.floor(rand(5, 9));
      const depth = width * rand(.48, .82);
      const collisionPieces = [];

      for (let i = 0; i < pieces; i++) {
        const central = i === 0;
        const pieceW = central ? width : width * rand(.32, .72);
        const pieceD = central ? depth : depth * rand(.38, .78);
        const pieceH = central ? height : height * rand(.42, .88);
        const detailPoints = distant ? 9 : 11;
        const geometry = createJaggedRockGeometry(
          pieceW,
          pieceD,
          pieceH,
          distant ? 4 : 5,
          detailPoints,
          flatTop && (central || Math.random() < .45)
        );
        const mesh = new THREE.Mesh(
          geometry,
          material
        );
        if (!central) {
          const side = i % 2 ? -1 : 1;
          mesh.position.set(
            side * width * rand(.38, .92) + rand(-width * .18, width * .18),
            rand(-2.4, 1.2),
            rand(-depth * .65, depth * .65)
          );
        }
        mesh.rotation.y = rand(-.55, .55);
        mesh.rotation.z = rand(-.035, .035);
        mesh.scale.set(rand(.88, 1.16), rand(.92, 1.08), rand(.82, 1.2));
        mesh.castShadow = !distant;
        mesh.receiveShadow = true;
        group.add(mesh);
        collisionPieces.push({ mesh, geometry, detailPoints });
      }

      // Low rubble at the base removes the remaining clean geometric silhouette.
      const rubbleCount = distant ? 3 : 7;
      for (let i = 0; i < rubbleCount; i++) {
        const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(width * rand(.08, .20), 0), material);
        rock.position.set(rand(-width * 1.05, width * 1.05), rand(0, height * .07), rand(-depth, depth));
        rock.scale.set(rand(.7, 1.8), rand(.35, .9), rand(.7, 1.7));
        rock.rotation.set(rand(0, 1), rand(0, TAU), rand(0, 1));
        rock.castShadow = !distant;
        rock.receiveShadow = true;
        group.add(rock);
      }

      group.position.set(x, terrainHeight(x, z) + (flatTop ? -1.5 : -4), z);
      group.rotation.y = rand(0, TAU);
      scene.add(group);
      registerRockFormationColliders(group, collisionPieces);
      return group;
    }

    function registerRockFormationColliders(group, pieces) {
      group.updateMatrixWorld(true);

      for (const { mesh, geometry, detailPoints } of pieces) {
        const positions = geometry.getAttribute("position");
        let minX = Infinity, maxX = -Infinity;
        let minZ = Infinity, maxZ = -Infinity;

        // The first vertex ring is the footprint at ground level. Approximate its
        // irregular ellipse with overlapping circles so long mesas block cars
        // without making their entire rectangular bounding box solid.
        for (let i = 0; i < detailPoints; i++) {
          minX = Math.min(minX, positions.getX(i));
          maxX = Math.max(maxX, positions.getX(i));
          minZ = Math.min(minZ, positions.getZ(i));
          maxZ = Math.max(maxZ, positions.getZ(i));
        }

        const centerX = (minX + maxX) * .5;
        const centerZ = (minZ + maxZ) * .5;
        const halfX = (maxX - minX) * .5 * Math.abs(mesh.scale.x);
        const halfZ = (maxZ - minZ) * .5 * Math.abs(mesh.scale.z);
        const alongX = halfX >= halfZ;
        const major = alongX ? halfX : halfZ;
        const minor = alongX ? halfZ : halfX;
        const radius = Math.max(2.2, minor * .78);
        const span = Math.max(0, major - radius);
        const count = span > 0 ? Math.min(9, Math.ceil(span * 2 / (radius * 1.35)) + 1) : 1;

        for (let i = 0; i < count; i++) {
          const scaledOffset = count === 1 ? 0 : lerp(-span, span, i / (count - 1));
          const localCenter = new THREE.Vector3(
            centerX + (alongX ? scaledOffset / Math.abs(mesh.scale.x) : 0),
            0,
            centerZ + (alongX ? 0 : scaledOffset / Math.abs(mesh.scale.z))
          );
          mesh.localToWorld(localCenter);
          world.obstacles.push({
            pos: new THREE.Vector3(localCenter.x, 0, localCenter.z),
            radius,
            mesh: group,
            kind: "rockFormation",
          });
        }
      }
    }

    function createSky() {
      const geo = new THREE.SphereGeometry(900, 32, 16);
      const mat = new THREE.ShaderMaterial({
        side: THREE.BackSide,
        uniforms: {
          topColor: { value: new THREE.Color(0x522e63) },
          midColor: { value: new THREE.Color(0xe46b41) },
          bottomColor: { value: new THREE.Color(0xf0b262) },
          sunColor: { value: new THREE.Color(0xffcf78) },
          sunDirection: { value: new THREE.Vector3(-165, 72, -310).normalize() },
        },
        vertexShader: `
          varying vec3 vWorldPosition;
          void main() {
            vec4 worldPosition = modelMatrix * vec4(position, 1.0);
            vWorldPosition = worldPosition.xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform vec3 topColor;
          uniform vec3 midColor;
          uniform vec3 bottomColor;
          uniform vec3 sunColor;
          uniform vec3 sunDirection;
          varying vec3 vWorldPosition;
          void main() {
            vec3 viewDirection = normalize(vWorldPosition - cameraPosition);
            float h = viewDirection.y;
            vec3 col = mix(bottomColor, midColor, smoothstep(-0.10, 0.20, h));
            col = mix(col, topColor, smoothstep(0.18, 0.78, h));
            float towardSun = dot(viewDirection, sunDirection);
            float sunGlow = smoothstep(0.975, 0.999, towardSun);
            float sunDisc = smoothstep(0.9982, 0.9990, towardSun);
            col += sunColor * sunGlow * 0.34;
            col = mix(col, sunColor, sunDisc * 0.96);
            gl_FragColor = vec4(col, 1.0);
          }
        `
      });
      scene.add(new THREE.Mesh(geo, mat));

      const mountainMat = new THREE.MeshStandardMaterial({
        color: 0x5d2c32,
        roughness: 1,
        flatShading: true
      });
      for (let i = 0; i < 30; i++) {
        const a = i / 30 * TAU + rand(-.055, .055);
        const r = rand(570, 735);
        const h = rand(48, 112);
        const w = rand(48, 105);
        createRockFormation(
          Math.sin(a) * r,
          Math.cos(a) * r,
          w,
          h,
          mountainMat,
          false,
          true
        );
      }
    }

    function createWorld() {
      const groundMat = new THREE.MeshStandardMaterial({
        map: makeNoiseTexture(),

      const groundGeometry = new THREE.PlaneGeometry(1640, 1640, 144, 144);
      groundGeometry.rotateX(-Math.PI / 2);

      for (let i = 0; i < groundPositions.count; i++) {

      addRoadPath([

      addRoadPath([

      // New large outer ring gives the expanded area a fast continuous route.

        P(0, 335), P(145, 310), P(275, 210), P(335, 70),

      ], 13.5, roadMat, true);

      addRoadPath([P(246, -230), P(300, -255), P(356, -270)], 10.5, roadMat);
      addRoadPath([P(-245, 220), P(-300, 250), P(-345, 275)], 10.5, roadMat);
      addRoadPath([P(265, 208), P(315, 235), P(350, 270)], 9.5, roadMat);

      // Dense prop pass across both the old center and the expanded outskirts.
      for (let i = 0; i < 170; i++) {
        const angle = rand(0, TAU);
        const radius = rand(38, 315);
        const x = Math.sin(angle) * radius;
        const z = Math.cos(angle) * radius;

      }
      for (let i = 0; i < 135; i++) {

        Math.random() < .60 ? createRock(x, z, rand(.9, 3.0)) : createCactus(x, z, rand(.8, 1.8));

      const mesaMat = new THREE.MeshStandardMaterial({

      for (let i = 0; i < 22; i++) {

      createGasStation(-105, -55);

      createBillboard(82, 72, -2.4);
      createBillboard(-82, 112, .8);

      createBillboard(-280, 185, 2.2);

      // Two utility corridors make the expanded roads feel inhabited.
      createUtilityPoleLine(-305, 22, 24, 15, .05);
      createUtilityPoleLine(35, -350, 20, 17, Math.PI / 2);

    function addRoadPath(controlPoints, width, material, closed = false) {
      const curve = new THREE.CatmullRomCurve3(controlPoints, closed, "centripetal", .45);
      const approximateLength = curve.getLength();
      const divisions = Math.max(12, Math.ceil(approximateLength / 3.2));
      const points = curve.getSpacedPoints(divisions);
      if (closed) points.pop();
      for (const point of points) {
        point.y = terrainHeight(point.x, point.z) + .08;
      }

      const count = points.length;
      const vertices = [];
      const uvs = [];
      const indices = [];
      const distances = [0];

      for (let i = 1; i < count; i++) distances[i] = distances[i - 1] + points[i].distanceTo(points[i - 1]);
      const totalLength = closed ? distances[count - 1] + points[count - 1].distanceTo(points[0]) : distances[count - 1];

      for (let i = 0; i < count; i++) {
        const prev = points[(i - 1 + count) % count];
        const next = points[(i + 1) % count];
        let tangent;
        if (!closed && i === 0) tangent = next.clone().sub(points[i]);
        else if (!closed && i === count - 1) tangent = points[i].clone().sub(prev);
        else tangent = next.clone().sub(prev);
        tangent.y = 0;
        tangent.normalize();

        const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).multiplyScalar(width * .5);
        const left = points[i].clone().add(normal);
        const right = points[i].clone().sub(normal);
        left.y = terrainHeight(left.x, left.z) + .08;
        right.y = terrainHeight(right.x, right.z) + .08;
        vertices.push(left.x, left.y, left.z, right.x, right.y, right.z);
        const v = distances[i] / 34;
        uvs.push(0, v, 1, v);
      }

      const segmentCount = closed ? count : count - 1;
      for (let i = 0; i < segmentCount; i++) {
        const j = (i + 1) % count;
        const a = i * 2, b = a + 1, c = j * 2, d = c + 1;
        // Counter-clockwise winding when viewed from above. The previous
        // order pointed the road faces downward, so Three.js back-face culling
        // hid every ribbon and only the circular junction pads remained visible.
        indices.push(a, c, b, b, c, d);
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(vertices, 3));
      geometry.setAttribute("uv", new THREE.Float32BufferAttribute(uvs, 2));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();

      const roadMaterial = material.clone();
      roadMaterial.map = material.map.clone();
      roadMaterial.map.repeat.set(1, 1);
      roadMaterial.map.needsUpdate = true;
      const road = new THREE.Mesh(geometry, roadMaterial);
      road.receiveShadow = true;
      scene.add(road);

      for (let i = 0; i < segmentCount; i++) {
        const j = (i + 1) % count;
        world.roads.push({ a: points[i].clone(), b: points[j].clone(), width });
      }
      return { curve, mesh: road, length: totalLength };
    }

    function distanceToRoadNetwork(x, z) {
      let nearest = Infinity;
      for (const road of world.roads) {
        const abx = road.b.x - road.a.x;
        const abz = road.b.z - road.a.z;
        const lenSq = abx * abx + abz * abz || 1;
        const t = clamp(((x - road.a.x) * abx + (z - road.a.z) * abz) / lenSq, 0, 1);
        const dx = x - (road.a.x + abx * t);
        const dz = z - (road.a.z + abz * t);
        nearest = Math.min(nearest, Math.sqrt(dx * dx + dz * dz) - road.width * .5);
      }
      return nearest;
    }

    function hasRoadClearance(x, z, propRadius = 0, margin = 2) {
      return distanceToRoadNetwork(x, z) >= propRadius + margin;
    }

    function createRock(x, z, s) {
      if (!hasRoadClearance(x, z, s*1.3, 2.5)) return;
      const geo = new THREE.DodecahedronGeometry(s * 1.7, 0);
      const mat = new THREE.MeshStandardMaterial({ color: 0x7b4430, roughness: 1 });
      const rock = new THREE.Mesh(geo, mat);
      rock.scale.set(rand(.8, 1.4), rand(.55, 1.1), rand(.8, 1.45));
      rock.position.set(x, terrainHeight(x, z) + s * .65, z);
      rock.rotation.set(rand(0,1), rand(0,TAU), rand(0,1));
      rock.castShadow = rock.receiveShadow = true;
      scene.add(rock);
      world.obstacles.push({ pos: new THREE.Vector3(x,0,z), radius: s*1.3, mesh: rock });
    }

    function createCactus(x, z, s) {
      if (!hasRoadClearance(x, z, .8*s, 2.5)) return;
      const g = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x496943, roughness: .9 });
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(.35*s,.48*s,4.5*s,8), mat);
      trunk.position.y = 2.25*s;
      trunk.castShadow = true;
      g.add(trunk);
      for (const side of [-1,1]) {
        const arm = new THREE.Mesh(new THREE.CylinderGeometry(.18*s,.22*s,1.8*s,8), mat);
        arm.position.set(side*.72*s,2.4*s,0);
        arm.rotation.z = side*Math.PI/2;
        arm.castShadow = true;
        g.add(arm);
        const tip = new THREE.Mesh(new THREE.CylinderGeometry(.18*s,.22*s,1.35*s,8), mat);
        tip.position.set(side*1.45*s,3.0*s,0);
        tip.castShadow = true;
        g.add(tip);
      }
      g.position.set(x,terrainHeight(x, z),z);
      g.rotation.y = rand(0,TAU);
      scene.add(g);
      world.obstacles.push({
        pos: new THREE.Vector3(x,0,z),
        radius: .8*s,
        mesh: g,
        destructible: true,
        kind: "cactus",
        toughness: 5.5,
      });
    }

    function createRoadblock(x, z, angle, width) {
      // A fortified barrier that blocks a road — concrete slabs, barrels, rocks.
      const g = new THREE.Group();
      const concrete = new THREE.MeshStandardMaterial({ color: 0x9e9e96, roughness: .82, metalness: .06 });
      const warn = new THREE.MeshStandardMaterial({ color: 0xee8b30, roughness: .55, metalness: .18, emissive: 0x330800, emissiveIntensity: .65 });
      const darkMetal = new THREE.MeshStandardMaterial({ color: 0x3a3530, roughness: .65, metalness: .45 });
      const halfW = width / 2;

      // Big central Jersey-barrier-style concrete wedges.
      for (let i = -2; i <= 2; i++) {
        const xOff = i * 2.3 + rand(-.15, .15);
        if (Math.abs(xOff) > halfW) continue;
        const block = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.05, 1.4), concrete);
        block.position.set(xOff, .58, rand(-.35, .35));
        block.rotation.y = rand(-.06, .06);
        block.rotation.z = rand(-.04, .04);
        block.castShadow = true;
        block.receiveShadow = true;
        g.add(block);

        // Striped warning top on a few.
        if (i % 2 === 0) {
          const stripe = new THREE.Mesh(new THREE.BoxGeometry(1.85, .08, 1.25), warn);
          stripe.position.set(xOff, 1.12, rand(-.35, .35));
          stripe.rotation.y = rand(-.06, .06);
          g.add(stripe);
        }
      }

      // Metal barrels scattered around.
      for (let i = 0; i < 7; i++) {
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(.32, .36, 1.05, 10), darkMetal);
        barrel.position.set(rand(-halfW, halfW), .53, rand(-3.5, 3.5));
        barrel.rotation.x = rand(-.22, .22);
        barrel.rotation.z = rand(-.22, .22);
        barrel.castShadow = true;
        g.add(barrel);
      }

      // Large flanking rocks.
      for (let side = -1; side <= 1; side += 2) {
        for (let j = 0; j < 3; j++) {
          const s = rand(1.1, 2.2);
          const rock = new THREE.Mesh(
            new THREE.DodecahedronGeometry(s, 0),
            new THREE.MeshStandardMaterial({ color: 0x7b4430, roughness: 1 })
          );
          rock.scale.set(rand(.7, 1.3), rand(.45, .9), rand(.7, 1.35));
          rock.position.set(side * (halfW + rand(.8, 2.5)), s * .55, rand(-4, 4));
          rock.rotation.set(rand(0, 1), rand(0, TAU), rand(0, 1));
          rock.castShadow = true;
          rock.receiveShadow = true;
          g.add(rock);
        }
      }

      g.position.set(x, terrainHeight(x, z), z);
      g.rotation.y = angle;
      scene.add(g);

      // Warning signs are separate breakable props, not part of the rigid barrier.
      for (let side = -1; side <= 1; side += 2) {
        const poleH = rand(3.2, 4.2);
        const local = new THREE.Vector3(side * (halfW - .6), 0, rand(2, 4));
        const worldPos = local.clone().applyAxisAngle(new THREE.Vector3(0,1,0), angle).add(new THREE.Vector3(x,0,z));
        worldPos.y = terrainHeight(worldPos.x, worldPos.z);
        const signGroup = new THREE.Group();
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(.06, .08, poleH, 6), darkMetal.clone());
        pole.position.y = poleH / 2;

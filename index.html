    function shuffled(values) {
      const result = values.slice();
      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

    function spawnPositionClearsObstacles(pos, clearance = 7) {
      let clear = true;
      forEachObstacleInBounds(
        pos.x - clearance,
        pos.z - clearance,
        pos.x + clearance,
        pos.z + clearance,
        obstacle => {
          if (!clear || obstacle.destroyed) return;
          const safeRadius = obstacle.radius + clearance;
          const dx = pos.x - obstacle.pos.x;
          const dz = pos.z - obstacle.pos.z;
          if (dx * dx + dz * dz < safeRadius * safeRadius) clear = false;
        }
      );
      return clear;
    }

    function findEnemySpawnPosition(excludeEnemy = null) {
      let candidate = new THREE.Vector3();
      for (let attempt = 0; attempt < 96; attempt++) {
        if (attempt < 72 || !world.roads.length) {
          const a = rand(0, TAU);
          const r = rand(225, world.radius - 52);
          candidate.set(Math.sin(a) * r, 0, Math.cos(a) * r);
        } else {
          const road = world.roads[Math.floor(rand(0, world.roads.length))];
          candidate.copy(road.a).lerp(road.b, rand(.12, .88));
          const tangent = road.b.clone().sub(road.a).setY(0).normalize();
          candidate.addScaledVector(
            new THREE.Vector3(-tangent.z, 0, tangent.x),
            rand(-road.width * .18, road.width * .18)
          );
        }
        candidate.y = terrainHeight(candidate.x, candidate.z);
        const mapDistance = Math.hypot(candidate.x, candidate.z);
        if (mapDistance < 90 || mapDistance > world.radius - 45) continue;
        if (candidate.distanceToSquared(player.pos) < 75 * 75) continue;
        if (!spawnPositionClearsObstacles(candidate, 7)) continue;
        let clear = true;
        for (const other of world.enemies) {
          if (other !== excludeEnemy && !other.dead &&
              candidate.distanceToSquared(other.pos) < 13 * 13) {
            clear = false;
            break;
          }
        }
        if (clear) return candidate.clone();
      }
      for (const radius of [300, 250, 350, 200]) {
        const offset = rand(0, TAU);
        for (let i = 0; i < 48; i++) {
          const angle = offset + i / 48 * TAU;
          candidate.set(Math.sin(angle) * radius, 0, Math.cos(angle) * radius);
          candidate.y = terrainHeight(candidate.x, candidate.z);
          if (candidate.distanceToSquared(player.pos) >= 75 * 75 &&
              spawnPositionClearsObstacles(candidate, 7)) return candidate.clone();
        }
      }
      candidate.set(0, terrainHeight(0, 0), 0);
      return candidate;
    }

    function spawnEnemy(type = "raider") {
      const spec = ENEMY_ARCHETYPES[type] || ENEMY_ARCHETYPES.raider;
      const c = createCar(randomEnemyPaint(type), true, type);
      const spawnPos = findEnemySpawnPosition();
      const health = Math.round(spec.healthBase + wave * spec.healthPerWave);
      const enemy = {
        type,
        group: c.group,
        bodyPivot: c.bodyPivot,
        wheels: c.wheels,
        muzzleL: c.muzzleL,
        muzzleR: c.muzzleR,
        damage: c.damage,
        pos: spawnPos,
        velocity: new THREE.Vector3(),
        yaw: Math.atan2(-spawnPos.x, -spawnPos.z),
        health,
        maxHealth: health,
        fireCooldown: rand(spec.fireMin, spec.fireMax),
        fireMin: spec.fireMin,
        fireMax: spec.fireMax,
        fireRange: spec.fireRange,
        fireCone: spec.fireCone,
        bulletDamage: spec.bulletDamage,
        acceleration: spec.acceleration,
        maxSpeed: spec.maxSpeed,
        turnRate: spec.turnRate,
        preferredDistance: spec.preferredDistance,
        radius: spec.radius,
        collisionDistance: spec.collisionDistance,
        collisionRadius: spec.radius,
        collisionHalfSegment: Math.max(1.75, 3.9 * spec.scale - spec.radius),
        mass: spec.mass,
        ramBonus: spec.ramBonus,
        ballisticDamageScale: spec.ballisticDamageScale ?? 1,
        scoreValue: spec.score,
        explosionScale: spec.explosionScale,
        debrisScale: spec.debrisScale,
        minimapColor: spec.minimapColor,
        minimapSize: spec.minimapSize,
        ramCooldown: 0,
        dead: false,
        damageRatio: 0,
        smokeTimer: rand(0,.08),
        fireTimer: rand(0,.05),
        wobble: rand(0,TAU),
        navSamplePos: spawnPos.clone(),
        navSampleTimer: 0,
        stuckTimer: 0,
        skill: clamp(.65 + wave*.045 + spec.skillBonus + rand(-.08,.08), .60, 1.28),
      };
      alignVehicleToTerrain(enemy, true);
      enemy.group.position.copy(enemy.pos);
      enemy.group.scale.setScalar(spec.scale);
      scene.add(enemy.group);
      world.enemies.push(enemy);
    }

    function spawnWave() {
      const count = ENEMIES_PER_WAVE_OPTIONS[enemiesPerWaveOptionIndex];
      const hasBoss = wave % 4 === 0;
      const regularCount = count - (hasBoss ? 1 : 0);
      const unlocked = unlockedEnemyTypes();
      const lineup = [];

      // Fill the wave in shuffled batches so unlocked types visibly alternate
      // instead of repeatedly rolling the same vehicle.
      while (lineup.length < regularCount) lineup.push(...shuffled(unlocked));
      for (let i = 0; i < regularCount; i++) spawnEnemy(lineup[i]);
      if (hasBoss) spawnEnemy("boss");

      audio?.playWhenReady("wave", {
        volume: hasBoss ? .68 : .48, priority: 3, bus: "ui",
      });
      showMessage(hasBoss ? `WAVE ${wave} · WARLORD INBOUND` : `WAVE ${wave}`);
    }

    function changeRoundOption(direction) {
      if (started) return;
      roundOptionIndex = (roundOptionIndex + direction + ROUND_OPTIONS.length) % ROUND_OPTIONS.length;
      updateRoundOptionDisplay();
    }

    function updateRoundOptionDisplay() {
      const option = ROUND_OPTIONS[roundOptionIndex];
      ui.roundTimeValue.textContent = option.label;
      ui.timerText.textContent = Number.isFinite(option.seconds) ? formatRoundTime(option.seconds) : "∞";
    }

    function changeEnemiesPerWaveOption(direction) {
      if (started) return;
      enemiesPerWaveOptionIndex = (
        enemiesPerWaveOptionIndex + direction + ENEMIES_PER_WAVE_OPTIONS.length
      ) % ENEMIES_PER_WAVE_OPTIONS.length;
      updateEnemiesPerWaveDisplay();
    }

    function updateEnemiesPerWaveDisplay() {
      const count = ENEMIES_PER_WAVE_OPTIONS[enemiesPerWaveOptionIndex];
      ui.enemyWaveValue.textContent = `${count} GEGNER`;
    }

    function formatRoundTime(seconds) {
      if (!Number.isFinite(seconds)) return "∞";
      const whole = Math.max(0, Math.ceil(seconds));
      const minutes = Math.floor(whole / 60);
      const remainder = whole % 60;
      return `${String(minutes).padStart(2, "0")}:${String(remainder).padStart(2, "0")}`;
    }

    function nearestEnemyDistanceSquared(pos) {
      let nearest = Infinity;
      for (const enemy of world.enemies) {
        if (!enemy.dead) nearest = Math.min(nearest, pos.distanceToSquared(enemy.pos));
      }
      return nearest;
    }

    function playerSpawnClearsObstacles(pos) {
      return spawnPositionClearsObstacles(pos, 6);
    }

    function findPlayerSpawnPosition() {
      let best = null;
      let bestEnemyDistance = -1;

      for (let attempt = 0; attempt < 80; attempt++) {
        let candidate;
        if (world.roads.length) {
          const road = world.roads[Math.floor(rand(0, world.roads.length))];
          const t = rand(.08, .92);
          candidate = road.a.clone().lerp(road.b, t);
          candidate.y = terrainHeight(candidate.x, candidate.z);
          const tangent = road.b.clone().sub(road.a).setY(0).normalize();
          const side = new THREE.Vector3(-tangent.z, 0, tangent.x);
          candidate.addScaledVector(side, rand(-road.width * .16, road.width * .16));
        } else {
          const angle = rand(0, TAU);
          const radius = rand(70, world.radius - 45);
          candidate = new THREE.Vector3(Math.sin(angle) * radius, 0, Math.cos(angle) * radius);
        }

        const radius = Math.hypot(candidate.x, candidate.z);
        if (radius < 55 || radius > world.radius - 28) continue;
        if (!playerSpawnClearsObstacles(candidate)) continue;

        const enemyDistance = nearestEnemyDistanceSquared(candidate);
        if (enemyDistance > bestEnemyDistance) {
          bestEnemyDistance = enemyDistance;
          best = candidate.clone();
        }
        if (enemyDistance >= 72 * 72) return candidate;
      }

      if (best) return best;
      const angle = rand(0, TAU);
      const radius = rand(120, world.radius - 70);
      const fallback = new THREE.Vector3(Math.sin(angle) * radius, 0, Math.cos(angle) * radius);
      fallback.y = terrainHeight(fallback.x, fallback.z);
      return fallback;
    }

    function clearEnemyProjectilesNear(pos, radius = 58) {
      const radiusSq = radius * radius;
      world.bullets = world.bullets.filter(bullet => {
        if (bullet.owner === "enemy" && bullet.pos.distanceToSquared(pos) < radiusSq) {
          return false;
        }
        return true;
      });
      world.rockets = world.rockets.filter(rocket => {
        if (rocket.owner === "enemy" && rocket.pos.distanceToSquared(pos) < radiusSq) {
          scene.remove(rocket.mesh);
          return false;
        }
        return true;
      });
    }

    function placePlayerAtRandomSpawn(isRespawn = false) {
      const spawnPos = findPlayerSpawnPosition();
      player.pos.set(spawnPos.x, terrainHeight(spawnPos.x, spawnPos.z), spawnPos.z);
      player.yaw = Math.atan2(spawnPos.x, spawnPos.z);
      player.velocity.set(0, 0, 0);
      player.speed = 0;
      player.health = player.maxHealth;
      player.heat = 0;
      player.nitro = 100;
      player.rockets = 6;
      player.fireCooldown = .35;
      player.rocketCooldown = .75;
      player.invuln = isRespawn ? 2.6 : 1.8;
      player.alive = true;
      player.driftAmount = 0;
      player.brakeAmount = 0;
      player.smokeTimer = 0;
      player.fireTimer = 0;
      player.bodyPivot.rotation.set(0, 0, 0);
      player.bodyPivot.position.y = 0;
      alignVehicleToTerrain(player, true);
      player.group.position.copy(player.pos);
      player.group.visible = cameraMode !== "cockpit";
      if (player.cockpit) player.cockpit.visible = cameraMode === "cockpit";
      updateEnemyDamageVisuals(player);
      clearEnemyProjectilesNear(player.pos);
      audio?.playEngineStart(player.pos);
      audio?.startEngine();
      if (isRespawn) showMessage("BACK ON THE ROAD", 1.2);
    }

    function startGame() {
      ui.startScreen.style.display = "none";
      ui.hud.classList.add("visible");
      started = true;
      gameEnded = false;
      roundTimeRemaining = ROUND_OPTIONS[roundOptionIndex].seconds;
      if (!audio) audio = createAudio();
      audio?.resume();
      placePlayerAtRandomSpawn(false);
      spawnWave();
      showMessage("START");
    }

    function clearInput() {
      for (const k in input) input[k] = false;
    }

    function applyCameraMode({ persist = true, announce = false } = {}) {
      const cockpitView = cameraMode === "cockpit";
      ui.crosshair.classList.add("hidden");
      if (player.group) player.group.visible = !started || (player.alive && !cockpitView);
      if (player.cockpit) player.cockpit.visible = started && player.alive && cockpitView;
      if (persist) saveUserSetting("cameraMode", cameraMode);
      if (announce) showMessage(cockpitView ? "COCKPIT VIEW" : "CHASE VIEW", .9);
    }

    function onKey(e) {
      const down = e.type === "keydown";
      switch (e.code) {
        case "KeyW": case "ArrowUp": input.forward = down; break;
        case "KeyS": case "ArrowDown": input.back = down; break;
        case "KeyA": case "ArrowLeft": input.left = down; break;
        case "KeyD": case "ArrowRight": input.right = down; break;
        case "ControlLeft": case "ControlRight": input.brake = down; e.preventDefault(); break;
        case "ShiftLeft": case "ShiftRight": input.boost = down; break;
        case "Space": input.fire = down; e.preventDefault(); break;
        case "AltLeft": case "AltRight": input.rocket = down; e.preventDefault(); break;
        case "KeyC":
          if (down && !e.repeat && started && !gameEnded) {
            cameraMode = cameraMode === "chase" ? "cockpit" : "chase";
            applyCameraMode({ announce: true });
          }
          break;
      }
    }

    function forwardFromYaw(yaw, out = new THREE.Vector3()) {
      return out.set(-Math.sin(yaw), 0, -Math.cos(yaw));
    }

    function rightFromYaw(yaw, out = new THREE.Vector3()) {
      return out.set(Math.cos(yaw), 0, -Math.sin(yaw));
    }

    function angleDelta(a, b) {
      let d = (b - a + Math.PI) % TAU - Math.PI;
      if (d < -Math.PI) d += TAU;
      return d;
    }

    function updatePlayer(dt) {
      if (!player.alive) return;

      player.fireCooldown -= dt;
      player.rocketCooldown -= dt;
      player.invuln -= dt;

      const forward = forwardFromYaw(player.yaw, tempVectorA);
      const right = rightFromYaw(player.yaw, tempVectorB);
      let longSpeed = player.velocity.dot(forward);
      let lateralSpeed = player.velocity.dot(right);

      const serviceBraking = input.back && longSpeed > .1;
      player.brakeAmount = lerp(
        player.brakeAmount,
        serviceBraking ? 1 : 0,
        1-Math.exp(-dt*(serviceBraking ? 4.2 : 7))
      );
      const throttle = input.forward ? 1 : (input.back && !serviceBraking ? -1 : 0);
      const steer = input.left ? 1 : input.right ? -1 : 0;
      const boosting = input.boost && input.forward && player.nitro > 0;

      const accel = boosting ? 38 : (throttle > 0 ? 24 : 16);
      if (throttle !== 0) {
        player.velocity.addScaledVector(forward, throttle * accel * dt);
      }

      if (serviceBraking) {
        const brakeForce = lerp(7.5, 16.5, player.brakeAmount);
        const brakeStep = Math.min(Math.abs(longSpeed), brakeForce*dt);
        player.velocity.addScaledVector(forward, -Math.sign(longSpeed)*brakeStep);
        longSpeed = player.velocity.dot(forward);
      }

      const speedAbs = Math.abs(longSpeed);
      const steerPower = lerp(1.3, .48, clamp(speedAbs/52,0,1));
      if (speedAbs > .7) {
        player.yaw += steer * steerPower * dt * clamp(speedAbs/8, .22, 1.55) * Math.sign(longSpeed);
      }

      const grip = input.brake ? 1.4 : 6.2;
      player.velocity.addScaledVector(right, -lateralSpeed * clamp(grip * dt, 0, .92));
      player.driftAmount = lerp(player.driftAmount, clamp(Math.abs(lateralSpeed)/15,0,1), 1-Math.pow(.001,dt));

      const maxSpeed = boosting ? 72 : 54;
      const reverseSpeed = player.velocity.dot(forward);
      if (reverseSpeed < -27) {
        player.velocity.addScaledVector(forward, -27-reverseSpeed);
      }
      const flatSpeed = player.velocity.length();
      if (flatSpeed > maxSpeed) player.velocity.multiplyScalar(maxSpeed / flatSpeed);
      player.velocity.multiplyScalar(Math.pow(input.brake ? .72 : .94, dt));

      if (!input.forward && !input.back) {
        player.velocity.multiplyScalar(Math.pow(.84, dt));
      }

      if (boosting) {
        player.nitro = Math.max(0, player.nitro - 28*dt);
        spawnBoostFlame();
      } else {
        player.nitro = Math.min(100, player.nitro + 8*dt);
      }

      player.pos.addScaledVector(player.velocity, dt);
      constrainToWorld(player);

      alignVehicleToTerrain(player);
      player.group.position.copy(player.pos);
      player.speed = player.velocity.dot(forward);

      const roll = clamp(-steer * speedAbs / 90 + lateralSpeed/80, -.16, .16);
      const pitch = clamp(
        -throttle*.035 + (serviceBraking ? player.brakeAmount*.05 : 0) + (boosting ? -.025 : 0),
        -.08,
        .08
      );
      player.bodyPivot.rotation.z = lerp(player.bodyPivot.rotation.z, roll, 1-Math.pow(.0008,dt));
      player.bodyPivot.rotation.x = lerp(player.bodyPivot.rotation.x, pitch, 1-Math.pow(.001,dt));
      player.bodyPivot.position.y = Math.sin(performance.now()*.008) * Math.min(speedAbs/600, .035);

      for (const w of player.wheels) {
        w.spin -= player.speed * dt / .68;
        if (w.front) w.pivot.rotation.y = lerp(w.pivot.rotation.y, steer*.42, 1-Math.pow(.00001,dt));
      }
      refreshWheelInstances(player.wheels);
      if (player.steeringWheel) {
        player.steeringWheel.rotation.z = lerp(player.steeringWheel.rotation.z, steer * .82, 1 - Math.pow(.00002, dt));
      }
      if (player.speedNeedle) {
        const speedRatio = clamp(flatSpeed / 72, 0, 1);
        const rpmRatio = clamp((Math.abs(throttle) * .28) + flatSpeed / 82 + (boosting ? .18 : 0), 0, 1);
        player.speedNeedle.rotation.z = lerp(player.speedNeedle.rotation.z, 2.25 - speedRatio * 4.5, 1 - Math.pow(.003, dt));
        player.rpmNeedle.rotation.z = lerp(player.rpmNeedle.rotation.z, 2.25 - rpmRatio * 4.5, 1 - Math.pow(.006, dt));
      }

      const dustRate = clamp((flatSpeed-6)/28,0,1) * (input.brake ? 2.5 : 1);
      if (Math.random() < dustRate * dt * 35) spawnDust(player.pos, player.yaw, flatSpeed);

      if (input.fire) firePlayerGun();
      if (input.rocket) firePlayerRocket();

      player.heat = Math.max(0, player.heat - 30*dt);
      updatePlayerDamageEffects(dt);
      if (updateAudioThisFrame) {
        updateEngineAudio(flatSpeed, throttle, boosting);
        audio?.updateSteering(
          player,
          steer,
          input.brake && player.driftAmount > .06,
          input.brake,
          flatSpeed,
          null,
          player.alive
        );
        audio?.setDamageAlarm(player.health <= 28);
      }
      handleObstacleCollisions(player, true);
    }

    function updateEngineAudio(speed, throttle, boosting) {
      if (!audio) return;
      audio.updateEngine(speed, throttle, boosting, player.alive);
      audio.updateGround(
        speed,
        distanceToRoadNetwork(player.pos.x, player.pos.z) <= 1.5,
        player.driftAmount > .08,
        player.alive
      );
    }

    function spawnBoostFlame() {
      if (Math.random() > .55) return;
      const back = forwardFromYaw(player.yaw).multiplyScalar(-1);
      const p = player.pos.clone().addScaledVector(back,2.9).add(new THREE.Vector3(rand(-.5,.5),.65,rand(-.3,.3)));
      spawnParticle(p, new THREE.Vector3(rand(-1,1),rand(.2,1.1),rand(-1,1)).addScaledVector(back,rand(6,12)), .22, 0x58d8ff, .34);
    }

    function constrainToWorld(obj) {
      // Horizontal handling remains arcade-like while visual height follows terrain.
      obj.velocity.y = 0;
      const len = Math.hypot(obj.pos.x, obj.pos.z);
      if (len > world.radius) {
        const nx = obj.pos.x / len, nz = obj.pos.z / len;
        obj.pos.x = nx * world.radius;
        obj.pos.z = nz * world.radius;
        const outward = obj.velocity.x * nx + obj.velocity.z * nz;
        if (outward > 0) {
          obj.velocity.x -= nx * outward * 1.7;
          obj.velocity.z -= nz * outward * 1.7;
        }
      }
      obj.pos.y = terrainHeight(obj.pos.x, obj.pos.z);
    }

    function firePlayerGun() {
      if (player.fireCooldown > 0 || player.heat > 96) return;
      player.fireCooldown = .085;
      player.heat = Math.min(100, player.heat + 5.5);
      const muzzle = Math.random() < .5 ? player.muzzleL : player.muzzleR;
      const pos = new THREE.Vector3();
      muzzle.getWorldPosition(pos);
      const forward = forwardFromYaw(player.yaw);
      let dir;
      if (cameraMode === "cockpit") {
        // The roof-mounted guns sit above and to the right of the driver's
        // sight line. Converge both barrels through the ring sight instead of
        // letting their parallel fire pass over its upper edge.
        const aimTarget = player.pos.clone()
          .addScaledVector(rightFromYaw(player.yaw), -.78)
          .addScaledVector(forward, 24)
          .setY(2.70);
        dir = aimTarget.sub(pos).normalize();
        dir.y += rand(-.004, .004);
      } else {
        dir = forward;
        dir.y = rand(-.006,.012);
      }
      dir.applyAxisAngle(new THREE.Vector3(0,1,0), rand(-.012,.012));
      createBullet(pos, dir.multiplyScalar(125).add(player.velocity), "player", 13);
      muzzleFlash(pos, 0xffc45c);
      audioShot("gun", pos);
      screenShake = Math.max(screenShake, .07);
    }

    function firePlayerRocket() {
      if (player.rocketCooldown > 0 || player.rockets <= 0) return;
      player.rocketCooldown = .72;
      player.rockets--;
      const pos = new THREE.Vector3();
      player.rocketMount.getWorldPosition(pos);
      const dir = forwardFromYaw(player.yaw);
      const rocket = createRocket(pos, dir.multiplyScalar(47).addScaledVector(player.velocity,.45), "player");
      rocket.sound = audioShot("rocket", rocket.pos);
      screenShake = Math.max(screenShake, .18);
    }

    function createFadingInstancePool(geometry, capacity, name) {
      const pooledGeometry = geometry.clone();
      const opacity = new THREE.InstancedBufferAttribute(new Float32Array(capacity), 1);
      opacity.setUsage(THREE.DynamicDrawUsage);
      pooledGeometry.setAttribute("instanceOpacity", opacity);
      const material = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 1,
        vertexColors: true,
        depthWrite: false,
      });
      material.onBeforeCompile = shader => {
        shader.vertexShader = shader.vertexShader
          .replace(
            "#include <common>",
            "#include <common>\nattribute float instanceOpacity;\nvarying float vInstanceOpacity;"
          )
          .replace(
            "#include <begin_vertex>",
            "#include <begin_vertex>\nvInstanceOpacity = instanceOpacity;"
          );
        shader.fragmentShader = shader.fragmentShader
          .replace(
            "#include <common>",
            "#include <common>\nvarying float vInstanceOpacity;"
          )
          .replace(
            "vec4 diffuseColor = vec4( diffuse, opacity );",
            "vec4 diffuseColor = vec4( diffuse, opacity * vInstanceOpacity );"
          );
      };
      material.customProgramCacheKey = () => "desert-instanced-opacity-v1";
      const mesh = new THREE.InstancedMesh(pooledGeometry, material, capacity);
      mesh.name = name;
      mesh.count = 0;
      mesh.frustumCulled = false;
      mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
      mesh.instanceColor = new THREE.InstancedBufferAttribute(
        new Float32Array(capacity * 3),
        3
      );
      mesh.instanceColor.setUsage(THREE.DynamicDrawUsage);
      scene.add(mesh);
      return { mesh, opacity, capacity, count: 0 };
    }

    function createParticleRenderer() {
      particleRenderer = {
        solid: createFadingInstancePool(
          new THREE.SphereGeometry(1, 6, 5),
          1024,
          "SolidParticlePool"
        ),
        smoke: createFadingInstancePool(
          new THREE.SphereGeometry(1, 6, 5),
          512,
          "SmokeParticlePool"
        ),
        streak: createFadingInstancePool(
          new THREE.BoxGeometry(1, 1, 1),
          384,
          "StreakParticlePool"
        ),
      };
    }

    function writeParticleInstance(pool, particle, scale, opacity) {
      if (pool.count >= pool.capacity) return;
      const index = pool.count++;
      tempObject.position.copy(particle.pos);
      tempObject.quaternion.copy(particle.quaternion || tempQuaternion.identity());
      if (particle.streak) {
        tempObject.scale.set(particle.width, particle.width, particle.length);
      } else {
        tempObject.scale.setScalar(scale);
      }
      tempObject.updateMatrix();
      pool.mesh.setMatrixAt(index, tempObject.matrix);
      tempColor.setHex(particle.color);
      pool.mesh.setColorAt(index, tempColor);
      pool.opacity.setX(index, opacity);
    }

    function refreshParticleInstances() {
      if (!particleRenderer) return;
      particleRenderer.solid.count = 0;
      particleRenderer.smoke.count = 0;
      particleRenderer.streak.count = 0;
      for (const particle of world.particles) {
        const lifeRatio = clamp(particle.life / particle.maxLife, 0, 1);
        if (particle.streak) {
          writeParticleInstance(
            particleRenderer.streak,
            particle,
            1,
            lifeRatio
          );
        } else if (particle.smoke) {
          const age = particle.maxLife - particle.life;
          writeParticleInstance(
            particleRenderer.smoke,
            particle,
            particle.size * Math.exp(age * 1.15),
            .46 * lifeRatio
          );
        } else {
          writeParticleInstance(
            particleRenderer.solid,
            particle,
            particle.size,
            lifeRatio
          );
        }
      }
      for (const pool of Object.values(particleRenderer)) {
        pool.mesh.count = pool.count;
        if (!pool.count) continue;
        pool.mesh.instanceMatrix.needsUpdate = true;
        pool.mesh.instanceColor.needsUpdate = true;
        pool.opacity.needsUpdate = true;
      }
    }

    function createBulletPool(color, name) {
      const mesh = new THREE.InstancedMesh(
        new THREE.SphereGeometry(.075, 6, 6),
        new THREE.MeshBasicMaterial({ color }),
        128
      );
      mesh.name = name;
      mesh.count = 0;
      mesh.frustumCulled = false;
      mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
      scene.add(mesh);
      return mesh;
    }

    function createBulletRenderer() {
      bulletRenderer = {
        player: createBulletPool(0xffdd76, "PlayerBulletPool"),
        enemy: createBulletPool(0xff472c, "EnemyBulletPool"),
      };
    }

    function refreshBulletInstances() {
      if (!bulletRenderer) return;
      let playerCount = 0;
      let enemyCount = 0;
      tempObject.quaternion.identity();
      tempObject.scale.set(1, 1, 1);
      for (const bullet of world.bullets) {
        const mesh = bullet.owner === "player" ? bulletRenderer.player : bulletRenderer.enemy;
        const index = bullet.owner === "player" ? playerCount++ : enemyCount++;
        if (index >= 128) continue;
        tempObject.position.copy(bullet.pos);
        tempObject.updateMatrix();
        mesh.setMatrixAt(index, tempObject.matrix);
      }
      bulletRenderer.player.count = Math.min(playerCount, 128);
      bulletRenderer.enemy.count = Math.min(enemyCount, 128);
      if (playerCount) bulletRenderer.player.instanceMatrix.needsUpdate = true;
      if (enemyCount) bulletRenderer.enemy.instanceMatrix.needsUpdate = true;
    }

    function createBullet(pos, velocity, owner, damage) {
      world.bullets.push({
        pos: pos.clone(),
        previousPos: pos.clone(),
        velocity: velocity.clone(),
        owner,
        damage,
        life: 1.7,
      });
    }

    function createRocket(pos, velocity, owner) {
      const mesh = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(.10,.14,.9,8),
        new THREE.MeshStandardMaterial({ color:0x34302a, metalness:.7, roughness:.3 })
      );
      body.rotation.x = Math.PI/2;
      mesh.add(body);
      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(.13,8,8),
        new THREE.MeshBasicMaterial({ color:0xff792e })
      );
      glow.position.z = .5;
      mesh.add(glow);
      mesh.position.copy(pos);
      scene.add(mesh);
      const rocket = {
        mesh,
        pos: pos.clone(),
        previousPos: pos.clone(),
        velocity: velocity.clone(),
        owner,
        life: 4.2,
        sound: null,
      };
      world.rockets.push(rocket);
      return rocket;
    }

    function muzzleFlash(pos, color) {
      flashLight(color, 4.8, 8, .055, pos);
      for (let i=0;i<3;i++) {
        spawnParticle(pos, new THREE.Vector3(rand(-2,2),rand(-1,2),rand(-2,2)), rand(.06,.12), color, .1);
      }
    }

    function updateEnemyDamageVisuals(e) {
      if (!e.damage) return;
      const ratio = clamp(1 - e.health / e.maxHealth, 0, 1);
      e.damageRatio = ratio;
      const d = e.damage;
      const xf = d.origXf;

      // Paint & materials — fade toward burned, increase roughness.
      d.paint.color.copy(d.basePaint).lerp(d.burnedPaint, clamp(ratio * .78, 0, .76));
      d.paint.roughness = d.baseRoughness + ratio * .42;
      d.paint.metalness = Math.max(0, d.baseMetalness - ratio * .34);
      d.glass.color.setHex(ratio > .68 ? 0x080b0c : ratio > .4 ? 0x101b20 : 0x15252d);

      for (const decal of d.decals) decal.mesh.visible = ratio >= decal.threshold;

      // Geometric warping — all offsets relative to factory transforms so the
      // effect works regardless of the car model (box or prism).
      const s = .40; // overall warp scale — keep subtle on the new detailed body
      const bend = d.seed >= 0 ? 1 : -1;
      d.hood.rotation.z = xf.hoodRZ + bend * ratio * .05 * s;
      d.hood.rotation.x = xf.hoodRX + ratio * .035 * s;
      d.hood.position.y = xf.hoodY - ratio * .06 * s;
      d.roof.rotation.z = xf.roofRZ - bend * Math.max(0, ratio - .42) * .04 * s;
      d.cabin.rotation.z = xf.cabinRZ + bend * Math.max(0, ratio - .58) * .020 * s;
      d.bumperFront.rotation.y = xf.bfRY + bend * Math.max(0, ratio - .28) * .12 * s;
      d.bumperFront.position.y = xf.bfY - Math.max(0, ratio - .45) * .14 * s;
      d.bumperRear.rotation.z = xf.brRZ - bend * Math.max(0, ratio - .66) * .08 * s;
      d.armorL.rotation.z = xf.alRZ - Math.max(0, ratio - .35) * .10 * s;
      d.armorR.rotation.z = xf.arRZ + Math.max(0, ratio - .55) * .08 * s;
    }

    function damageEnemy(e, amount, hitPos = null, playImpact = true, impactVelocity = null) {
      if (!e || e.dead || amount <= 0) return;
      e.health = Math.max(0, e.health - amount);
      updateEnemyDamageVisuals(e);

      if (hitPos) {
        if (playImpact) audioImpact(clamp(amount / 13, .55, 1.45), hitPos);
        if (impactVelocity) ballisticImpact(hitPos, impactVelocity, "enemy");
        else hitSpark(hitPos, amount > 25 ? 0xff8a3d : 0xffd07a);
        if (e.damage?.paint) {
          e.damage.paint.emissive.setHex(0x7a260f);
          e.damage.paint.emissiveIntensity = .75;
          setTimeout(() => {
            if (!e.damage?.paint) return;
            e.damage.paint.emissive.setHex(0x000000);
            e.damage.paint.emissiveIntensity = 0;
          }, 45);
        }
      }

      if (e.health <= 0) destroyEnemy(e);
    }

    function updateVehicleDamageEffects(vehicle, dt) {
      if (!vehicle?.alive && vehicle === player) return;
      if (vehicle.dead || vehicle.health <= 0) return;

      const healthRatio = vehicle.health / (vehicle.maxHealth || 100);
      const mediumDamage = healthRatio <= .65;
      const criticalDamage = healthRatio <= .35;
      if (!mediumDamage) {
        vehicle.smokeTimer = Math.min(vehicle.smokeTimer ?? 0, .08);
        vehicle.fireTimer = Math.min(vehicle.fireTimer ?? 0, .04);
        return;
      }

      vehicle.smokeTimer = (vehicle.smokeTimer ?? 0) - dt;
      vehicle.fireTimer = (vehicle.fireTimer ?? 0) - dt;

      const forward = forwardFromYaw(vehicle.yaw);
      const right = rightFromYaw(vehicle.yaw);
      const hoodBase = vehicle.pos.clone()
        .addScaledVector(forward, 2.12)
        .add(new THREE.Vector3(0, 1.78, 0));

      if (vehicle.smokeTimer <= 0) {
        if (criticalDamage) {
          vehicle.smokeTimer = rand(.052, .082);
          const source = hoodBase.clone()
            .addScaledVector(right, rand(-.56, .56))
            .addScaledVector(forward, rand(-.32, .38));
          const smokeVelocity = vehicle.velocity.clone().multiplyScalar(.08)
            .add(new THREE.Vector3(rand(-.9,.9), rand(2.5,4.5), rand(-.9,.9)));
          const darkSmoke = [0x171311, 0x211916, 0x30231e, 0x3b2c25];
          spawnParticle(
            source,
            smokeVelocity,
            rand(.32,.58),
            darkSmoke[Math.floor(rand(0,darkSmoke.length))],
            rand(1.45,2.35),
            true
          );
        } else {
          vehicle.smokeTimer = rand(.105, .165);
          const source = hoodBase.clone()
            .addScaledVector(right, rand(-.38, .38))
            .addScaledVector(forward, rand(-.18, .24));
          const smokeVelocity = vehicle.velocity.clone().multiplyScalar(.06)
            .add(new THREE.Vector3(rand(-.38,.38), rand(1.25,2.15), rand(-.38,.38)));
          const lightSmoke = [0xd0cbc3, 0xbab5ad, 0xa49f98, 0x8f8b85];
          spawnParticle(
            source,
            smokeVelocity,
            rand(.18,.31),
            lightSmoke[Math.floor(rand(0,lightSmoke.length))],
            rand(1.05,1.65),
            true
          );
        }
      }

      if (criticalDamage && vehicle.fireTimer <= 0) {
        vehicle.fireTimer = rand(.050, .078);
        const flameCount = Math.random() < .58 ? 2 : 1;
        const flameColors = [0xffe07a, 0xffaa32, 0xff641f, 0xe63816];
        for (let i = 0; i < flameCount; i++) {
          const source = hoodBase.clone()
            .addScaledVector(right, rand(-.66, .66))
            .addScaledVector(forward, rand(-.48, .42))
            .add(new THREE.Vector3(0, rand(-.04,.18), 0));
          const flameVelocity = vehicle.velocity.clone().multiplyScalar(.05)
            .add(new THREE.Vector3(rand(-1.35,1.35), rand(3.0,6.8), rand(-1.35,1.35)));
          spawnParticle(
            source,
            flameVelocity,
            rand(.075,.16),
            flameColors[Math.floor(rand(0,flameColors.length))],
            rand(.20,.43)
          );
        }
      }
    }

    function updateEnemyDamageEffects(e, dt) {
      updateVehicleDamageEffects(e, dt);
    }

    function updatePlayerDamageEffects(dt) {
      updateVehicleDamageEffects(player, dt);
    }

    function updateEnemies(dt) {
      const pPos = player.pos;
      for (const e of world.enemies) {
        if (e.dead) continue;
        e.fireCooldown -= dt;
        e.ramCooldown -= dt;
        e.wobble += dt;

        let avoidanceX = 0;
        let avoidanceZ = 0;
        for (const other of world.enemies) {
          if (other === e || other.dead) continue;
          const awayX = e.pos.x - other.pos.x;
          const awayZ = e.pos.z - other.pos.z;
          const awayDist = Math.hypot(awayX, awayZ);
          if (awayDist > .001 && awayDist < 11) {
            const strength = (11 - awayDist) / (11 * awayDist);
            avoidanceX += awayX * strength;
            avoidanceZ += awayZ * strength;
          }
        }
        e.velocity.x += avoidanceX * 13 * dt;
        e.velocity.z += avoidanceZ * 13 * dt;

        const toPlayerX = pPos.x - e.pos.x;
        const toPlayerZ = pPos.z - e.pos.z;
        const dist = Math.hypot(toPlayerX, toPlayerZ);
        const desiredYaw = Math.atan2(-toPlayerX, -toPlayerZ);
        const lead = clamp(dist/55,0,1.5);
        const toTargetX = toPlayerX + player.velocity.x * lead;
        const toTargetZ = toPlayerZ + player.velocity.z * lead;
        let targetYaw = Math.atan2(-toTargetX, -toTargetZ);
        targetYaw += Math.sin(e.wobble*.7) * (dist<28 ? .35 : .12);
        const turn = clamp(angleDelta(e.yaw, targetYaw), -1, 1);

        const forwardX = -Math.sin(e.yaw);
        const forwardZ = -Math.cos(e.yaw);
        const rightX = Math.cos(e.yaw);
        const rightZ = -Math.sin(e.yaw);
        const longSpeed = e.velocity.x * forwardX + e.velocity.z * forwardZ;
        const latSpeed = e.velocity.x * rightX + e.velocity.z * rightZ;
        const throttle = dist > e.preferredDistance + 2 ? 1 : dist < e.preferredDistance - 4 ? -.45 : .28;
        const acceleration = throttle * e.acceleration * e.skill * dt;
        e.velocity.x += forwardX * acceleration;
        e.velocity.z += forwardZ * acceleration;
        e.yaw += turn * e.turnRate * dt * lerp(1.4,.58,clamp(Math.abs(longSpeed)/e.maxSpeed,0,1)) * clamp(Math.abs(longSpeed)/7,.25,1.4);
        const lateralCorrection = -latSpeed * clamp(5*dt,0,.9);
        e.velocity.x += rightX * lateralCorrection;
        e.velocity.z += rightZ * lateralCorrection;
        e.velocity.multiplyScalar(Math.pow(.86,dt));
        if (e.velocity.length()>e.maxSpeed*e.skill) e.velocity.setLength(e.maxSpeed*e.skill);

        e.pos.addScaledVector(e.velocity,dt);
        constrainToWorld(e);
        alignVehicleToTerrain(e);
        e.group.position.copy(e.pos);
        e.bodyPivot.rotation.z = lerp(e.bodyPivot.rotation.z,-turn*.08,1-Math.pow(.003,dt));

        for (const w of e.wheels) {
          w.spin -= longSpeed*dt/.68;
          if (w.front) w.pivot.rotation.y = lerp(w.pivot.rotation.y,turn*.38,1-Math.pow(.001,dt));
        }
        refreshWheelInstances(e.wheels);

        if (Math.random() < clamp((e.velocity.length()-6)/32,0,1)*dt*18) spawnDust(e.pos,e.yaw,e.velocity.length());
        updateEnemyDamageEffects(e,dt);
        const audibleTurn = Math.abs(turn) > .08 ? turn : 0;
        const enemyBraking = throttle < 0;
        const enemyDrifting = Math.abs(latSpeed) > 4.5 && audibleTurn !== 0;
        if (updateAudioThisFrame) {
          audio?.updateVehicleEngine(e, e.velocity.length(), throttle, e.pos, !e.dead);
          audio?.updateSteering(
            e,
            audibleTurn,
            enemyDrifting,
            enemyBraking,
            e.velocity.length(),
            e.pos,
            !e.dead
          );
        }

        const facing = Math.abs(angleDelta(e.yaw, desiredYaw));
        if (dist < e.fireRange && facing < e.fireCone && e.fireCooldown <= 0) {
          e.fireCooldown = rand(e.fireMin,e.fireMax) / e.skill;
          enemyFire(e);
        }

        handleObstacleCollisions(e,false);

        e.navSampleTimer += dt;
        if (e.navSampleTimer >= 1) {
          const progress = Math.hypot(
            e.pos.x - e.navSamplePos.x,
            e.pos.z - e.navSamplePos.z
          );
          e.stuckTimer = dist > 65 && progress < 1.5
            ? e.stuckTimer + e.navSampleTimer
            : 0;
          e.navSamplePos.copy(e.pos);
          e.navSampleTimer = 0;
          if (e.stuckTimer >= 6) {
            e.pos.copy(findEnemySpawnPosition(e));
            e.velocity.set(0, 0, 0);
            e.yaw = Math.atan2(
              -(player.pos.x - e.pos.x),
              -(player.pos.z - e.pos.z)
            );
            e.stuckTimer = 0;
            e.navSamplePos.copy(e.pos);
            alignVehicleToTerrain(e, true);
            e.group.position.copy(e.pos);
          }
        }

        if (e.health <= 0) destroyEnemy(e);
      }
      resolveVehicleCollisions();
      world.enemies = world.enemies.filter(e => {
        if (!e.dead) return true;
        e.deathTimer -= dt;
        if (e.deathTimer > 0) return true;
        scene.remove(e.group);
        return false;
      });
    }

    function enemyFire(e) {
      const muzzle = Math.random() < .5 ? e.muzzleL : e.muzzleR;
      const pos = new THREE.Vector3();
      muzzle.getWorldPosition(pos);
      const target = player.pos.clone().add(new THREE.Vector3(rand(-1.4,1.4),1,rand(-1.4,1.4)));
      const dir = target.sub(pos).normalize();
      createBullet(pos, dir.multiplyScalar(94).add(e.velocity), "enemy", e.bulletDamage);
      muzzleFlash(pos,0xff5635);
      audioShot("gun", pos, "enemy");
    }

    function vehicleCapsuleContact(a, b) {
      const forwardAx = -Math.sin(a.yaw);
      const forwardAz = -Math.cos(a.yaw);
      const forwardBx = -Math.sin(b.yaw);
      const forwardBz = -Math.cos(b.yaw);
      const segmentA = a.collisionHalfSegment;
      const segmentB = b.collisionHalfSegment;
      const p1x = a.pos.x - forwardAx * segmentA;
      const p1z = a.pos.z - forwardAz * segmentA;
      const q1x = a.pos.x + forwardAx * segmentA;
      const q1z = a.pos.z + forwardAz * segmentA;
      const p2x = b.pos.x - forwardBx * segmentB;
      const p2z = b.pos.z - forwardBz * segmentB;
      const q2x = b.pos.x + forwardBx * segmentB;
      const q2z = b.pos.z + forwardBz * segmentB;
      const d1x = q1x - p1x, d1z = q1z - p1z;
      const d2x = q2x - p2x, d2z = q2z - p2z;
      const rx = p1x - p2x, rz = p1z - p2z;
      const aLen = d1x * d1x + d1z * d1z;
      const eLen = d2x * d2x + d2z * d2z;
      const f = d2x * rx + d2z * rz;
      let s, t;

      if (aLen <= .000001 && eLen <= .000001) {
        s = t = 0;
      } else if (aLen <= .000001) {
        s = 0;
        t = clamp(f / eLen, 0, 1);
      } else {
        const c = d1x * rx + d1z * rz;
        if (eLen <= .000001) {
          t = 0;
          s = clamp(-c / aLen, 0, 1);
        } else {
          const coupling = d1x * d2x + d1z * d2z;
          const denominator = aLen * eLen - coupling * coupling;
          s = denominator !== 0 ? clamp((coupling * f - c * eLen) / denominator, 0, 1) : 0;
          t = (coupling * s + f) / eLen;
          if (t < 0) {
            t = 0;
            s = clamp(-c / aLen, 0, 1);
          } else if (t > 1) {
            t = 1;
            s = clamp((coupling - c) / aLen, 0, 1);
          }
        }
      }

      const pointAx = p1x + d1x * s;
      const pointAz = p1z + d1z * s;
      const pointBx = p2x + d2x * t;
      const pointBz = p2z + d2z * t;
      let nx = pointBx - pointAx;
      let nz = pointBz - pointAz;
      let distanceSq = nx * nx + nz * nz;
      const minDistance = a.collisionRadius + b.collisionRadius;
      if (distanceSq >= minDistance * minDistance) return null;

      if (distanceSq < .000001) {
        nx = b.pos.x - a.pos.x;
        nz = b.pos.z - a.pos.z;
        distanceSq = nx * nx + nz * nz;
        if (distanceSq < .000001) {
          nx = -forwardAz;
          nz = forwardAx;
          distanceSq = 1;
        }
      }

      const distance = Math.sqrt(distanceSq);
      return {
        normal: new THREE.Vector3(nx / distance, 0, nz / distance),
        penetration: minDistance - distance,
        pointA: new THREE.Vector3(pointAx, 0, pointAz),
        pointB: new THREE.Vector3(pointBx, 0, pointBz),
      };
    }

    function resolveVehiclePair(a, b, allowDamage) {
      const contact = vehicleCapsuleContact(a, b);
      if (!contact) return;

      const normal = contact.normal;
      const invA = 1 / a.mass;
      const invB = 1 / b.mass;
      const invSum = invA + invB;
      const correction = Math.max(0, contact.penetration - .015) * .90 / invSum;
      a.pos.addScaledVector(normal, -correction * invA);
      b.pos.addScaledVector(normal, correction * invB);

      const relativeVelocity = b.velocity.clone().sub(a.velocity);
      const closingSpeed = relativeVelocity.dot(normal);
      const impactSpeed = Math.max(0, -closingSpeed);
      let crashPoint = null;
      if (allowDamage && impactSpeed > 5) {
        crashPoint = contact.pointA.clone().lerp(contact.pointB, .5).add(new THREE.Vector3(0, 1, 0));
        audioVehicleCrash(impactSpeed, crashPoint);
      }
      if (closingSpeed < 0) {
        const restitution = .20;
        const impulseMagnitude = -(1 + restitution) * closingSpeed / invSum;
        const impulse = normal.clone().multiplyScalar(impulseMagnitude);
        a.velocity.addScaledVector(impulse, -invA);
        b.velocity.addScaledVector(impulse, invB);

        const tangent = relativeVelocity.clone().sub(normal.clone().multiplyScalar(closingSpeed));
        if (tangent.lengthSq() > .0001) {
          tangent.normalize();
          const tangentSpeed = relativeVelocity.dot(tangent);
          const frictionImpulse = clamp(-tangentSpeed / invSum, -impulseMagnitude * .34, impulseMagnitude * .34);
          a.velocity.addScaledVector(tangent, -frictionImpulse * invA);
          b.velocity.addScaledVector(tangent, frictionImpulse * invB);
        }
      }

      if (a !== player) {
        a.ramCooldown = Math.max(a.ramCooldown, .10);
        b.ramCooldown = Math.max(b.ramCooldown, .10);
      } else if (allowDamage && impactSpeed > 8 && b.ramCooldown <= 0) {
        b.ramCooldown = .55;
        damagePlayer(impactSpeed * .34 + b.ramBonus);
        crashPoint ??= contact.pointA.clone().lerp(contact.pointB, .5).add(new THREE.Vector3(0, 1, 0));
        damageEnemy(b, impactSpeed * .44, crashPoint, true);
        explosion(crashPoint, .45, false);
      }
    }

    function resolveVehicleCollisions() {
      const active = world.enemies.filter(e => !e.dead);
      const vehicles = player.alive ? [player, ...active] : active;

      // Multiple passes keep dense clusters separated. The first pass can apply
      // crash damage; later passes only finish positional correction.
      for (let pass = 0; pass < 3; pass++) {
        for (let i = 0; i < vehicles.length; i++) {
          for (let j = i + 1; j < vehicles.length; j++) {
            resolveVehiclePair(vehicles[i], vehicles[j], pass === 0);
          }
        }
      }

      for (const vehicle of vehicles) {
        vehicle.pos.y = terrainHeight(vehicle.pos.x, vehicle.pos.z);
        vehicle.velocity.y = 0;
        constrainToWorld(vehicle);
        alignVehicleToTerrain(vehicle);
        vehicle.group.position.copy(vehicle.pos);
      }
    }

    function shatterObstacle(o, impactVelocity, hitNormal) {
      if (o.destroyed) return;
      o.destroyed = true;
      const source = o.mesh;
      const baseVelocity = impactVelocity.clone().multiplyScalar(.32);
      const pieces = [];

      source.updateMatrixWorld(true);
      source.traverse(child => {
        if (!child.isMesh || child.userData.renderBatch || pieces.length >= 16) return;
        const geometry = child.geometry.clone();
        const material = child.material.clone();
        const mesh = new THREE.Mesh(geometry, material);
        child.getWorldPosition(mesh.position);
        child.getWorldQuaternion(mesh.quaternion);
        child.getWorldScale(mesh.scale);
        mesh.castShadow = true;
        scene.add(mesh);
        pieces.push(mesh);
      });

      scene.remove(source);
      for (const mesh of pieces) {
        const outward = mesh.position.clone().sub(o.pos).setY(0);
        if (outward.lengthSq() < .01) outward.copy(hitNormal);
        outward.normalize();
        world.debris.push({
          mesh,
          pos: mesh.position.clone(),
          velocity: baseVelocity.clone()
            .addScaledVector(outward, rand(3, 9))
            .add(new THREE.Vector3(rand(-2.5,2.5), rand(4,10), rand(-2.5,2.5))),
          angular: new THREE.Vector3(rand(-7,7),rand(-8,8),rand(-7,7)),
          life: rand(4.5,7),
          maxLife: 7,
          floor: (o.kind === "sign" || o.kind === "utilityPole") ? .08 : .16,
        });
      }
      spawnDust(o.pos, rand(0,TAU), Math.max(16, impactVelocity.length()));
      audioImpact(clamp(impactVelocity.length()/18,.55,1.35), o.pos);
    }

    function handleObstacleCollisions(obj,isPlayer) {
      const vehicleRadius = isPlayer ? 1.8 : 1.7;
      forEachObstacleInBounds(
        obj.pos.x - vehicleRadius,
        obj.pos.z - vehicleRadius,
        obj.pos.x + vehicleRadius,
        obj.pos.z + vehicleRadius,
        o => {
        if (o.destroyed) return;
        const dx = obj.pos.x-o.pos.x, dz=obj.pos.z-o.pos.z;
        const d2=dx*dx+dz*dz;
        const min = o.radius + vehicleRadius;
        if (d2<min*min && d2>.001) {
          const d=Math.sqrt(d2), nx=dx/d,nz=dz/d;
          const n=new THREE.Vector3(nx,0,nz);
          const impactSpeed = Math.max(0, -obj.velocity.dot(n));

          if (o.destructible && impactSpeed >= o.toughness) {
            shatterObstacle(o, obj.velocity, n);
            const lightProp = o.kind === "sign" || o.kind === "utilityPole";
            obj.velocity.multiplyScalar(lightProp ? .95 : (o.kind === "billboard" ? .82 : .88));
            return;
          }

          if (impactSpeed > 5) {
            const crashPos = obj.pos.clone().addScaledVector(n, -vehicleRadius);
            audioTerrainCrash(impactSpeed, crashPos);
          }
          obj.pos.x=o.pos.x+nx*min;
          obj.pos.z=o.pos.z+nz*min;
          const v=obj.velocity.dot(n);
          if(v<0)obj.velocity.addScaledVector(n,-v*1.55);
          obj.velocity.multiplyScalar(.72);
          if(isPlayer && Math.abs(v)>8) damagePlayer(Math.abs(v)*.25);
        }
      });
    }

    function projectileObstacleHit(from, to, extraRadius = 0) {
      const vx = to.x - from.x;
      const vz = to.z - from.z;
      const a = vx * vx + vz * vz;
      if (a < .000001) return null;

      let nearest = null;
      let nearestT = Infinity;
      forEachObstacleInBounds(
        Math.min(from.x, to.x) - extraRadius,
        Math.min(from.z, to.z) - extraRadius,
        Math.max(from.x, to.x) + extraRadius,
        Math.max(from.z, to.z) + extraRadius,
        o => {
        if (!o.destructible || o.destroyed) return;
        const radius = o.radius + extraRadius;
        const ox = from.x - o.pos.x;
        const oz = from.z - o.pos.z;
        const c = ox * ox + oz * oz - radius * radius;
        const b = 2 * (ox * vx + oz * vz);
        const discriminant = b * b - 4 * a * c;
        if (discriminant < 0) return;

        const t = c <= 0 ? 0 : (-b - Math.sqrt(discriminant)) / (2 * a);
        if (t < 0 || t > 1 || t >= nearestT) return;

        const point = from.clone().lerp(to, t);
        const normal = point.clone().sub(o.pos).setY(0);
        if (normal.lengthSq() < .0001) {
          normal.set(-vx, 0, -vz);
        }
        normal.normalize();
        nearest = { obstacle: o, point, normal };
        nearestT = t;
      });
      return nearest;
    }

    function updateProjectiles(dt) {
      for (const b of world.bullets) {
        b.life -= dt;
        const previousPos = b.previousPos.copy(b.pos);
        b.pos.addScaledVector(b.velocity,dt);
        if (b.owner==="player") {
          for (const e of world.enemies) {
            if (e.dead) continue;
            // 2-D ground-plane hit check — ignores Y so roof-mounted
            // turrets still hit regardless of muzzle height.
            const dx=b.pos.x-e.pos.x, dz=b.pos.z-e.pos.z;
            if (dx*dx+dz*dz<6.5) {
              b.life=0;
              damageEnemy(e, b.damage * e.ballisticDamageScale, b.pos, true, b.velocity);
              break;
            }
          }
        } else if (player.alive) {
          const dx=b.pos.x-player.pos.x, dz=b.pos.z-player.pos.z;
          if (dx*dx+dz*dz<5.5) {
            b.life=0;
            damagePlayer(b.damage,b.pos,b.velocity);
          }
        }
        if (b.life > 0) {
          const propHit = projectileObstacleHit(previousPos, b.pos, .08);
          if (propHit) {
            b.life = 0;
            b.pos.copy(propHit.point);
            const impactVelocity = b.velocity.clone().setY(0);
            if (impactVelocity.lengthSq() > 0) impactVelocity.setLength(18);
            shatterObstacle(propHit.obstacle, impactVelocity, propHit.normal);
          }
        }
      }
      world.bullets = world.bullets.filter(b=>{
        if(b.life<=0)return false;
        return true;
      });
      refreshBulletInstances();

      for (const r of world.rockets) {
        r.life-=dt;
        const previousPos = r.previousPos.copy(r.pos);
        if(r.owner==="player") {
          let nearest=null, nd=36;
          for(const e of world.enemies){
            if(e.dead)continue;
            const d=e.pos.distanceTo(r.pos);
            if(d<nd){nd=d;nearest=e;}
          }
          if(nearest){
            const desired=nearest.pos.clone().add(new THREE.Vector3(0,1,0)).sub(r.pos).normalize().multiplyScalar(56);
            r.velocity.lerp(desired,clamp(dt*2.5,0,1));
          }
        }
        r.pos.addScaledVector(r.velocity,dt);
        r.mesh.position.copy(r.pos);
        r.mesh.lookAt(tempVectorA.copy(r.pos).add(r.velocity));
        if(Math.random()<dt*40){
          spawnParticle(r.pos,new THREE.Vector3(rand(-1,1),rand(-.5,1),rand(-1,1)),rand(.12,.24),0xff7a2d,.38);
        }

        let exploded=false;
        if(r.owner==="player"){
          for(const e of world.enemies){
            if(e.dead)continue;
            if(r.pos.distanceToSquared(e.pos)<7){
              rocketExplosion(r.pos, "player");
              r.life=0; exploded=true; break;
            }
          }
        } else if(r.pos.distanceToSquared(player.pos)<7){
          rocketExplosion(r.pos,"enemy");
          r.life=0; exploded=true;
        }
        if (!exploded) {
          const propHit = projectileObstacleHit(previousPos, r.pos, .28);
          if (propHit) {
            r.pos.copy(propHit.point);
            r.mesh.position.copy(r.pos);
            rocketExplosion(r.pos, r.owner);
            r.life=0; exploded=true;
          }
        }
        if(r.life<=0 && !exploded) rocketExplosion(r.pos,r.owner);
      }
      world.rockets=world.rockets.filter(r=>{
        if(r.life<=0){
          audio?.stopVoice(r.sound, .025);
          scene.remove(r.mesh);
          return false;
        }
        return true;
      });
    }

    function rocketExplosion(pos,owner){
      explosion(pos,1.25,true);
      forEachObstacleInBounds(pos.x - 16, pos.z - 16, pos.x + 16, pos.z + 16, o => {
        if (!o.destructible || o.destroyed) return;
        const offset = o.pos.clone().sub(pos).setY(0);
        const distance = offset.length();
        if (distance >= 14 + o.radius) return;
        if (offset.lengthSq() < .0001) offset.set(rand(-1,1), 0, rand(-1,1));
        const normal = offset.normalize();
        const blastStrength = 10 + 22 * (1 - clamp(distance / 14, 0, 1));
        shatterObstacle(o, normal.clone().multiplyScalar(blastStrength), normal);
      });
      if(owner==="player"){
        for(const e of world.enemies){
          if(e.dead)continue;
          const d=e.pos.distanceTo(pos);
          if(d<14){
            const blastDamage=72*(1-d/14);
            e.velocity.addScaledVector(e.pos.clone().sub(pos).setY(0).normalize(),18*(1-d/14));
            damageEnemy(e,blastDamage,e.pos.clone().add(new THREE.Vector3(0,1,0)),false);
          }
        }
      }else{
        const d=player.pos.distanceTo(pos);
        if(d<14)damagePlayer(34*(1-d/14));
      }
    }

    function damagePlayer(amount, hitPos = null, impactVelocity = null) {
      if (player.invuln>0 || !player.alive) return;
      player.health = Math.max(0,player.health-amount);
      updateEnemyDamageVisuals(player);
      if (hitPos) {
        ballisticImpact(hitPos, impactVelocity || new THREE.Vector3(rand(-1,1),0,rand(-1,1)), "player");
        audioImpact(clamp(amount / 13, .65, 1.35), hitPos);
      }
      player.invuln=.09;
      screenShake=Math.max(screenShake,.35);
      ui.damageFlash.style.opacity="1";
      setTimeout(()=>ui.damageFlash.style.opacity="0",90);
      if(player.health<=0) killPlayer();
    }

    function killPlayer() {
      if (!player.alive || gameEnded) return;
      player.alive = false;
      audio?.stopEngine();
      audio?.stopSteering(player);
      audio?.setDamageAlarm(false);
      respawnTimer = 2.3;
      clearInput();
      explosion(player.pos.clone().add(new THREE.Vector3(0,1,0)),2.1,true);
      player.group.visible = false;
      if (player.cockpit) player.cockpit.visible = false;
      showMessage("WRECKED", 1.1);
    }

    function updateRespawn(dt) {
      if (player.alive || gameEnded || respawnTimer <= 0) return;
      respawnTimer -= dt;
      if (respawnTimer <= 0) placePlayerAtRandomSpawn(true);
    }

    function updateRoundTimer(dt) {
      if (!Number.isFinite(roundTimeRemaining) || gameEnded) return;
      roundTimeRemaining = Math.max(0, roundTimeRemaining - dt);
      if (roundTimeRemaining <= 0) endRound();
    }

    function endRound() {
      if (gameEnded) return;
      gameEnded = true;
      clearInput();
      audio?.stopEngine();
      audio?.stopSteering(player);
      for (const enemy of world.enemies) {
        audio?.stopSteering(enemy);
        audio?.stopVehicleEngine(enemy);
      }
      audio?.setDamageAlarm(false);
      ui.timerText.textContent = "00:00";
      showMessage("TIME'S UP", .8);
      setTimeout(() => {
        ui.gameOver.style.display = "grid";
        ui.finalScore.textContent = `Score ${String(score).padStart(6,"0")} · Welle ${wave}`;
      }, 450);
    }

    function spawnVehicleDebris(e) {
      const scale = e.debrisScale;
      const paintColor = e.damage?.paint?.color?.getHex?.() ?? 0x4b2420;
      const yAxis = new THREE.Vector3(0,1,0);
      const parts = [
        { size:[3.35,.34,2.25], offset:[0,1.65,-2.1], color:paintColor, metalness:.72, roughness:.55 },
        { size:[2.65,.18,1.5], offset:[0,2.82,.3], color:paintColor, metalness:.7, roughness:.58 },
        { size:[.18,.72,3.2], offset:[-1.82,1.3,.15], color:0x24201c, metalness:.72, roughness:.55 },
        { size:[.18,.72,3.2], offset:[1.82,1.3,.15], color:0x24201c, metalness:.72, roughness:.55 },
        { size:[3.65,.25,.25], offset:[0,.92,-3.55], color:0x90877f, metalness:.92, roughness:.35 },
        { size:[3.65,.25,.25], offset:[0,.92,3.55], color:0x90877f, metalness:.92, roughness:.35 },
      ];

      for (const spec of parts) {
        const geometry = new THREE.BoxGeometry(spec.size[0]*scale,spec.size[1]*scale,spec.size[2]*scale);
        const material = new THREE.MeshStandardMaterial({color:spec.color,metalness:spec.metalness,roughness:spec.roughness});
        const mesh = new THREE.Mesh(geometry,material);
        const offset = new THREE.Vector3(spec.offset[0]*scale,spec.offset[1]*scale,spec.offset[2]*scale).applyAxisAngle(yAxis,e.yaw);
        mesh.position.copy(e.pos).add(offset);
        mesh.rotation.set(rand(-.25,.25),e.yaw+rand(-.3,.3),rand(-.25,.25));
        mesh.castShadow = true;
        scene.add(mesh);
        const outward = offset.clone().setY(0).normalize();
        const velocity = e.velocity.clone().multiplyScalar(.45)
          .addScaledVector(outward,rand(5,13))
          .add(new THREE.Vector3(rand(-5,5),rand(8,17),rand(-5,5)));
        world.debris.push({
          mesh,
          pos:mesh.position.clone(),
          velocity,
          angular:new THREE.Vector3(rand(-5,5),rand(-6,6),rand(-5,5)),
          life:rand(5.2,8.2),
          maxLife:8.2,
          floor:.18,
        });
      }

      for (const x of [-1.78,1.78]) {
        for (const z of [-2.25,2.25]) {
          const geometry = new THREE.CylinderGeometry(.68*scale,.68*scale,.48*scale,14);
          const material = new THREE.MeshStandardMaterial({color:0x0d0c0b,roughness:.96,metalness:.08});
          const mesh = new THREE.Mesh(geometry,material);
          const offset = new THREE.Vector3(x*scale,.74*scale,z*scale).applyAxisAngle(yAxis,e.yaw);
          mesh.position.copy(e.pos).add(offset);
          mesh.rotation.set(rand(0,TAU),e.yaw+Math.PI/2,rand(0,TAU));
          mesh.castShadow = true;
          scene.add(mesh);
          const outward = offset.clone().setY(0).normalize();
          world.debris.push({
            mesh,
            pos:mesh.position.clone(),
            velocity:e.velocity.clone().multiplyScalar(.5).addScaledVector(outward,rand(8,17)).add(new THREE.Vector3(rand(-4,4),rand(9,18),rand(-4,4))),
            angular:new THREE.Vector3(rand(-9,9),rand(-10,10),rand(-9,9)),
            life:rand(6,9),
            maxLife:9,
            floor:.66*scale,
          });
        }
      }
    }

    function destroyEnemy(e) {
      if(e.dead)return;
      e.dead=true;
      audio?.stopSteering(e);
      audio?.stopVehicleEngine(e);
      e.deathTimer=.08;
      score += e.scoreValue + wave*25;
      const blastPos=e.pos.clone().add(new THREE.Vector3(0,1.1,0));
      spawnVehicleDebris(e);
      explosion(blastPos,e.explosionScale,true);
      for(let i=0;i<Math.round(10*e.explosionScale/1.25);i++){
        spawnParticle(blastPos,new THREE.Vector3(rand(-5,5),rand(2,10),rand(-5,5)),rand(.24,.52),0x211815,rand(1.1,2.2),true);
      }
      e.group.visible=false;
      if(Math.random()<.22)spawnPickup(e.pos);
    }

    function spawnPickup(pos){
      const type=Math.random()<.55?"armor":"rocket";
      const g=new THREE.Group();
      const ring=new THREE.Mesh(
        new THREE.TorusGeometry(.75,.12,8,20),
        new THREE.MeshStandardMaterial({color:type==="armor"?0x6df0a3:0xffb347,emissive:type==="armor"?0x1e7b4a:0xb14418,emissiveIntensity:2})
      );
      ring.rotation.x=Math.PI/2;
      g.add(ring);
      const core=new THREE.Mesh(
        type==="armor"?new THREE.BoxGeometry(.55,.55,.55):new THREE.CylinderGeometry(.13,.18,.8,8),
        new THREE.MeshStandardMaterial({color:0xf0d7ae,metalness:.6,roughness:.3})
      );
      if(type==="rocket")core.rotation.x=Math.PI/2;
      g.add(core);
      g.position.copy(pos).add(new THREE.Vector3(0,1.4,0));
      scene.add(g);
      world.pickups.push({group:g,pos:pos.clone(),type,life:14,t:rand(0,TAU)});
    }

    function updatePickups(dt){
      for(const p of world.pickups){
        p.life-=dt;p.t+=dt;
        p.group.rotation.y+=dt*1.7;
        p.group.position.y=p.pos.y+1.25+Math.sin(p.t*3)*.18;
        if(player.alive && p.pos.distanceToSquared(player.pos)<12){
          if(p.type==="armor"){
            player.health=Math.min(player.maxHealth,player.health+30);
            updateEnemyDamageVisuals(player);
          } else player.rockets=Math.min(9,player.rockets+2);
          p.life=0;
          showMessage(p.type==="armor"?"ARMOR +30":"ROCKETS +2",.8);
          hitSpark(p.group.position, p.type==="armor"?0x6df0a3:0xffb347);
        }
      }
      world.pickups=world.pickups.filter(p=>{if(p.life<=0){scene.remove(p.group);return false;}return true;});
    }

    function spawnDust(pos,yaw,speed){
      const back=forwardFromYaw(yaw).multiplyScalar(-1);
      const p=pos.clone().addScaledVector(back,2.3).add(new THREE.Vector3(rand(-1.4,1.4),.18,rand(-.7,.7)));
      const v=back.multiplyScalar(rand(1,4)).add(new THREE.Vector3(rand(-1.5,1.5),rand(.7,2.2),rand(-1.5,1.5)));
      spawnParticle(p,v,rand(.18,.42),0xc78a5d,rand(.65,1.1),true);
    }

    function hitSpark(pos,color){
      for(let i=0;i<8;i++){
        spawnParticle(pos,new THREE.Vector3(rand(-7,7),rand(1,8),rand(-7,7)),rand(.045,.11),color,rand(.18,.36));
      }
    }

    function ballisticImpact(pos, incomingVelocity, target = "enemy") {
      const incoming = incomingVelocity.clone().normalize();
      const surfaceNormal = incoming.clone().multiplyScalar(-1);
      surfaceNormal.y = Math.max(.15, surfaceNormal.y + rand(-.12,.28));
      surfaceNormal.normalize();
      const hotColor = target === "player" ? 0xff6a32 : 0xffd37a;
      const coreColor = target === "player" ? 0xffb04d : 0xffffff;

      // Bright impact core and a tiny light flash make each bullet connection readable.
      spawnParticle(pos, surfaceNormal.clone().multiplyScalar(1.5), rand(.12,.18), coreColor, rand(.055,.085));
      flashLight(
        hotColor,
        target === "player" ? 7 : 5.5,
        7,
        target === "player" ? .075 : .055,
        pos
      );

      // Long, directional ricochet streaks. Elongated boxes read as sparks at speed.
      const streaks = target === "player" ? 15 : 12;
      for (let i=0; i<streaks; i++) {
        const velocity = surfaceNormal.clone().multiplyScalar(rand(4,11))
          .add(new THREE.Vector3(rand(-8,8),rand(-1,7),rand(-8,8)));
        const length = rand(.22,.55);
        spawnStreakParticle(
          pos,
          velocity,
          rand(.025,.055),
          length,
          Math.random()<.28 ? coreColor : hotColor,
          rand(.16,.32)
        );
      }

      // A few slower glowing metal chips linger after the initial flash.
      for (let i=0; i<(target === "player" ? 8 : 6); i++) {
        const chipVelocity = surfaceNormal.clone().multiplyScalar(rand(1.5,5))
          .add(new THREE.Vector3(rand(-3.5,3.5),rand(1,5.5),rand(-3.5,3.5)));
        spawnParticle(pos,chipVelocity,rand(.035,.075),Math.random()<.5?0xff8a32:0xffd06b,rand(.28,.55));
      }

      // Brief dust/smoke puff prevents the impact from feeling sterile.
      for (let i=0; i<3; i++) {
        spawnParticle(
          pos.clone().add(new THREE.Vector3(rand(-.12,.12),rand(-.05,.15),rand(-.12,.12))),
          surfaceNormal.clone().multiplyScalar(rand(.35,1.2)).add(new THREE.Vector3(rand(-.5,.5),rand(.35,1.1),rand(-.5,.5))),
          rand(.10,.18),
          target === "player" ? 0x39231d : 0x4a4035,
          rand(.28,.48),
          true
        );
      }
    }

    function explosion(pos,size=1,blast=true){
      if (blast) audioExplosion(size, pos);
      screenShake=Math.max(screenShake,.42*size);
      const colors=[0xffd05b,0xff762b,0xd83220,0x4a2017];
      const count=Math.floor(22+size*18);
      for(let i=0;i<count;i++){
        const v=new THREE.Vector3(rand(-1,1),rand(-.2,1.3),rand(-1,1)).normalize().multiplyScalar(rand(4,18)*size);
        spawnParticle(pos,v,rand(.12,.34)*size,colors[Math.floor(rand(0,colors.length))],rand(.4,.9)*size,i>count*.55);
      }
      flashLight(0xff6b2b,10*size,32*size,.22*size,pos);
    }

    function spawnStreakParticle(pos, velocity, width, length, color, life) {
      const direction = velocity.clone().normalize();
      const quaternion = new THREE.Quaternion().setFromUnitVectors(
        tempVectorA.set(0, 0, 1),
        direction
      );
      world.particles.push({
        pos: pos.clone(),
        velocity: velocity.clone(),
        width,
        length,
        color,
        life,
        maxLife: life,
        smoke: false,
        streak: true,
        quaternion,
      });
    }

    function spawnParticle(pos,velocity,size,color,life,smoke=false){
      world.particles.push({
        pos: pos.clone(),
        velocity: velocity.clone(),
        size,
        color,
        life,
        maxLife: life,
        smoke,
        streak: false,
      });
    }

    function updateEffects(dt){
      let particleWrite = 0;
      for(let i=0;i<world.particles.length;i++){
        const p=world.particles[i];
        p.life-=dt;
        if(p.life<=0) continue;
        p.velocity.y-= (p.smoke?-.2:9.8)*dt;
        p.velocity.multiplyScalar(Math.pow(p.smoke?.45:.82,dt));
        p.pos.addScaledVector(p.velocity,dt);
        world.particles[particleWrite++] = p;
      }
      world.particles.length = particleWrite;
      refreshParticleInstances();

      for(const d of world.debris){
        d.life-=dt;
        d.velocity.y-=18*dt;
        d.pos.addScaledVector(d.velocity,dt);
        d.mesh.position.copy(d.pos);
        d.mesh.rotation.x+=d.angular.x*dt;
        d.mesh.rotation.y+=d.angular.y*dt;
        d.mesh.rotation.z+=d.angular.z*dt;
        const terrainFloor=terrainHeight(d.pos.x,d.pos.z)+d.floor;
        if(d.pos.y<terrainFloor){
          d.pos.y=terrainFloor;
          if(d.velocity.y<0)d.velocity.y*=-.34;
          d.velocity.x*=Math.pow(.18,dt);
          d.velocity.z*=Math.pow(.18,dt);
          d.angular.multiplyScalar(Math.pow(.22,dt));
        }
        if(d.life<1.25){
          d.mesh.material.transparent=true;
          d.mesh.material.opacity=clamp(d.life/1.25,0,1);
        }
      }
      world.debris=world.debris.filter(d=>{
        if(d.life>0)return true;
        scene.remove(d.mesh);
        d.mesh.geometry.dispose();
        d.mesh.material.dispose();
        return false;
      });

      for(const l of world.lights){
        if (l.life <= 0) continue;
        l.life-=dt;
        l.light.intensity*=Math.pow(.012,dt);
        if (l.life <= 0) l.light.intensity = 0;
      }
    }

    function updateWave(dt){
      let alive = 0;
      for (const enemy of world.enemies) if (!enemy.dead) alive++;
      if(started && !gameEnded && alive===0){
        waveDelay+=dt;
        if(waveDelay>2.7){
          wave++;
          player.rockets=Math.min(9,player.rockets+1);
          player.health=Math.min(player.maxHealth,player.health+10);
          updateEnemyDamageVisuals(player);
          spawnWave();
          waveDelay=0;
        }
      }else waveDelay=0;
    }

    function updateCamera(dt){
      if(!player.group)return;
      const f=forwardFromYaw(player.yaw, tempVectorA);
      const right=rightFromYaw(player.yaw, tempVectorB);
      const speed=player.velocity.length();

      if(cameraMode === "cockpit" && player.alive){
        const cockpitPos=tempVectorC.copy(player.pos)
          .addScaledVector(right,-.78)
          .addScaledVector(f,-.30)
          .setY(player.pos.y + 2.72);
        camera.position.lerp(cockpitPos,1-Math.pow(.000001,dt));
        cameraEuler.set(-.025 + player.bodyPivot.rotation.x*.25, 0, player.bodyPivot.rotation.z*.20, "YXZ");
        cameraQuat.setFromEuler(cameraEuler);
        cameraQuat.premultiply(player.group.quaternion);
        camera.quaternion.slerp(cameraQuat,1-Math.pow(.000001,dt));
        camera.fov=lerp(camera.fov,72+clamp(speed-38,0,34)*.10+nitroVisualAmount*4,1-Math.pow(.008,dt));
        player.group.visible=false;
        if(player.cockpit)player.cockpit.visible=true;
      }else{
        const chaseDistance=10.7+clamp(speed/18,0,2.8);
        const desired=tempVectorC.copy(player.pos)
          .addScaledVector(f,-chaseDistance)
          .setY(player.pos.y + 5.25 + speed*.025);
        const look=tempVectorB.copy(player.pos)
          .addScaledVector(f,5.6+speed*.12)
          .setY(player.pos.y + 1.2);
        const follow=1-Math.pow(.0004,dt);
        camera.position.lerp(desired,follow);
        camera.lookAt(look);
        camera.fov=lerp(camera.fov,64+clamp(speed-35,0,35)*.16+nitroVisualAmount*4,1-Math.pow(.02,dt));
        player.group.visible=player.alive;
        if(player.cockpit)player.cockpit.visible=false;
      }

      if(screenShake>0){
        const shakeScale=cameraMode === "cockpit" ? .48 : 1;
        camera.position.add(
          tempVectorC.set(rand(-1,1),rand(-1,1),rand(-1,1))
            .multiplyScalar(screenShake*shakeScale)
        );
        screenShake=Math.max(0,screenShake-dt*1.6);
      }
      camera.updateProjectionMatrix();
      if (updateAudioThisFrame) {
        audioListenerRight.set(1, 0, 0).applyQuaternion(camera.quaternion);
        audio?.updateListener(camera.position, audioListenerRight);
      }
    }

    function updateNitroVisualEffect(dt) {
      const speed = player.velocity.length();
      const nitroActive = started && !gameEnded && player.alive &&
        input.boost && input.forward && player.nitro > 0;
      const target = nitroActive ? clamp((speed-18)/46, 0, 1) : 0;
      const response = target > nitroVisualAmount ? 5.5 : 7.5;
      nitroVisualAmount = lerp(nitroVisualAmount, target, 1-Math.exp(-dt*response));

      const opacity = (nitroVisualAmount*.34).toFixed(3);
      const transform = `scale(${(1.04+nitroVisualAmount*.055).toFixed(3)})`;
      const canvasFilter = nitroVisualAmount < .002
        ? ""
        : `blur(${(nitroVisualAmount*.65).toFixed(2)}px) saturate(${(1+nitroVisualAmount*.08).toFixed(3)})`;
      if (opacity !== lastNitroOpacity) {
        ui.speedEffect.style.opacity = lastNitroOpacity = opacity;
      }
      if (transform !== lastNitroTransform) {
        ui.speedEffect.style.transform = lastNitroTransform = transform;
      }
      if (canvasFilter !== lastCanvasFilter) {
        renderer.domElement.style.filter = lastCanvasFilter = canvasFilter;
      }
    }

    function updateSunShadow(dt) {
      if (!sunLight || !sunTarget) return;
      shadowUpdateAccumulator += dt;
      if (shadowUpdateAccumulator < 1/60) return;
      shadowUpdateAccumulator %= 1/60;

      const focus = started && player.alive ? player.pos : tempVectorA.set(0, 0, 0);
      const centerX = Math.round(focus.x * .5) * 2;
      const centerZ = Math.round(focus.z * .5) * 2;
      const centerY = terrainHeight(centerX, centerZ);
      sunTarget.position.set(centerX, centerY, centerZ);
      sunLight.position.set(centerX - 80, centerY + 110, centerZ - 70);
      sunTarget.updateMatrixWorld();
      sunLight.updateMatrixWorld();
      renderer.shadowMap.needsUpdate = true;
    }

    function updateRearViewMirror(dt) {
      if (!mirrorCamera || !mirrorRenderTarget || cameraMode !== "cockpit" ||
          !started || gameEnded || !player.alive) return;

      mirrorUpdateAccumulator += dt;
      if (mirrorUpdateAccumulator < 1/60) return;
      mirrorUpdateAccumulator %= 1/60;

      const forward = forwardFromYaw(player.yaw, tempVectorA);
      mirrorCamera.position.copy(player.pos)
        .addScaledVector(forward, -.55)
        .setY(player.pos.y + 2.85);
      mirrorLookTarget.copy(mirrorCamera.position).addScaledVector(forward, -45);
      mirrorLookTarget.y -= 1.15;
      mirrorCamera.lookAt(mirrorLookTarget);

      const mainCameraWasVisible = camera.visible;
      const playerWasVisible = player.group?.visible;
      const cockpitWasVisible = player.cockpit?.visible;
      camera.visible = false;
      if (player.group) player.group.visible = false;
      if (player.cockpit) player.cockpit.visible = false;
      const previousTarget = renderer.getRenderTarget();
      renderer.setRenderTarget(mirrorRenderTarget);
      renderer.render(scene, mirrorCamera);
      renderer.setRenderTarget(previousTarget);
      camera.visible = mainCameraWasVisible;
      if (player.group) player.group.visible = playerWasVisible;
      if (player.cockpit) player.cockpit.visible = cockpitWasVisible;
    }

    function setText(element, value) {
      if (element.textContent !== value) element.textContent = value;
    }

    function setWidth(element, value) {
      if (element.style.width !== value) element.style.width = value;
    }

    function updateHUD(dt){
      if(messageTimer>0){
        messageTimer-=dt;
        if(messageTimer<=0)ui.message.classList.remove("show");
      }
      hudUpdateAccumulator += dt;
      minimapUpdateAccumulator += dt;
      if (hudUpdateAccumulator >= 1/20) {
        hudUpdateAccumulator %= 1/20;
        const health = Math.ceil(player.health);
        const heat = Math.ceil(player.heat);
        const nitro = Math.ceil(player.nitro);
        setWidth(ui.armorFill, `${health}%`);
        setText(ui.armorText, `${health}%`);
        setWidth(ui.heatFill, `${heat}%`);
        setText(ui.heatText, `${heat}%`);
        setWidth(ui.boostFill, `${nitro}%`);
        setText(ui.boostText, `${nitro}%`);
        setText(ui.speed, String(Math.round(player.velocity.length()*(120/54))).padStart(3,"0"));
        setText(ui.score, String(score).padStart(6,"0"));
        let alive = 0;
        for (const enemy of world.enemies) if (!enemy.dead) alive++;
        setText(ui.hostiles, String(alive));
        setText(ui.ammo, String(player.rockets));
        setText(ui.timerText, formatRoundTime(roundTimeRemaining));
      }
      if (minimapUpdateAccumulator >= 1/20) {
        minimapUpdateAccumulator %= 1/20;
        drawMinimap();
      }
    }

    function showMessage(text,duration=1.4){
      ui.message.textContent=text;
      ui.message.classList.add("show");
      messageTimer=duration;
    }

    function drawMinimap(){
      const c=ui.minimap,ctx=c.getContext("2d"),w=c.width,h=c.height;
      ctx.clearRect(0,0,w,h);
      ctx.fillStyle="rgba(16,8,4,.86)";ctx.fillRect(0,0,w,h);
      ctx.save();ctx.translate(w/2,h/2);
      const s=82/world.radius;
      const cosYaw=Math.cos(player.yaw),sinYaw=Math.sin(player.yaw);
      const radarPoint=(pos)=>{
        const dx=pos.x-player.pos.x,dz=pos.z-player.pos.z;
        return {
          x:(dx*cosYaw-dz*sinYaw)*s,
          y:(dx*sinYaw+dz*cosYaw)*s
        };
      };
      ctx.strokeStyle="rgba(238,183,97,.2)";ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(0,0,world.radius*s,0,TAU);ctx.stroke();
      ctx.strokeStyle="rgba(219,190,142,.28)";ctx.lineWidth=3;
      for(const r of world.roads){
        ctx.beginPath();ctx.moveTo(r.a.x*s,r.a.z*s);ctx.lineTo(r.b.x*s,r.b.z*s);ctx.stroke();
      }
      for(const e of world.enemies){
        if(e.dead)continue;
        const p=radarPoint(e.pos);
        ctx.fillStyle=e.minimapColor;
        ctx.beginPath();ctx.arc(p.x,p.y,e.minimapSize,0,TAU);ctx.fill();
      }
      for(const p of world.pickups){
        const radarPos=radarPoint(p.pos);
        ctx.fillStyle=p.type==="armor"?"#6df0a3":"#ffb347";
        ctx.fillRect(radarPos.x-2,radarPos.y-2,4,4);
      }
      if (player.alive) {
        ctx.fillStyle="#fff3be";
        ctx.beginPath();ctx.moveTo(0,-6);ctx.lineTo(4,5);ctx.lineTo(0,3);ctx.lineTo(-4,5);ctx.closePath();ctx.fill();
      }
      ctx.restore();
    }

    function animate(t){
      const dt=Math.min(.033,Math.max(.001,(t-lastTime)/1000||.016));
      lastTime=t;
      simulationFrame++;
      audioUpdateAccumulator += dt;
      updateAudioThisFrame = audioUpdateAccumulator >= 1/30;
      if (updateAudioThisFrame) audioUpdateAccumulator %= 1/30;
      updateNitroVisualEffect(dt);
      if(started&&!gameEnded){
        updateRoundTimer(dt);
        updatePlayer(dt);
        updateEnemies(dt);
        updateProjectiles(dt);
        updatePickups(dt);
        updateEffects(dt);
        updateWave(dt);
        updateRespawn(dt);
        updateCamera(dt);
        updateHUD(dt);
      }else if(!started){
        player.group.rotation.y+=dt*.12;
        const orbit=t*.00007;
        camera.position.set(Math.sin(orbit)*17,7.2,Math.cos(orbit)*17);
        camera.lookAt(0,1.3,0);
      }else{
        updateEffects(dt);
        updateCamera(dt);
      }
      updateSunShadow(dt);
      updateRearViewMirror(dt);
      renderer.render(scene,camera);
    }

    function onResize(){
      camera.aspect=innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio,1.75));
    }

    init();
  })();
  </script>
</body>

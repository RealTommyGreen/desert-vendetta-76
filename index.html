    function createCar(color = 0x7c1c18, enemy = false, variant = "raider") {
      const car = new THREE.Group();
      const bodyPivot = new THREE.Group();
      car.add(bodyPivot);

      const paint = new THREE.MeshStandardMaterial({
        color,
        roughness: .56,
        metalness: .48,
      });
      const dark = new THREE.MeshStandardMaterial({ color: 0x181716, roughness: .68, metalness: .42 });
      const armor = new THREE.MeshStandardMaterial({ color: 0x292927, roughness: .62, metalness: .62 });
      const steel = new THREE.MeshStandardMaterial({ color: 0x77736d, roughness: .52, metalness: .78 });
      const glass = new THREE.MeshStandardMaterial({ color: 0x15252d, roughness: .18, metalness: .2 });
      const rubber = new THREE.MeshStandardMaterial({ color: 0x0d0c0b, roughness: .96 });
      const stripeMat = new THREE.MeshStandardMaterial({ color: 0x171717, roughness: .72, metalness: .22 });
      const gunMat = new THREE.MeshStandardMaterial({ color: 0x252525, roughness: .48, metalness: .82 });
      const orangeLight = new THREE.MeshStandardMaterial({ color: 0xffb13b, emissive: 0xff6a18, emissiveIntensity: 2.2 });

      const addBox = (w, h, d, mat, x, y, z, rx = 0, ry = 0, rz = 0) => {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
        mesh.position.set(x, y, z);
        mesh.rotation.set(rx, ry, rz);
        mesh.castShadow = mesh.receiveShadow = true;
        bodyPivot.add(mesh);
        return mesh;
      };

      // Custom low-poly prisms give the player car the long, sharp coupe silhouette
      // from the reference instead of looking like stacked boxes.
      const addPrism = (frontW, rearW, length, bottomY, frontTopY, rearTopY, mat, zCenter) => {
        const zF = zCenter - length * .5;
        const zR = zCenter + length * .5;
        const fw = frontW * .5, rw = rearW * .5;
        const verts = new Float32Array([
          -fw, bottomY, zF,   fw, bottomY, zF,   fw, frontTopY, zF,  -fw, frontTopY, zF,
          -rw, bottomY, zR,   rw, bottomY, zR,   rw, rearTopY, zR,   -rw, rearTopY, zR
        ]);
        const idx = [
          0,2,1, 0,3,2,      5,7,4, 5,6,7,
          4,3,0, 4,7,3,      1,6,5, 1,2,6,
          3,6,2, 3,7,6,      4,1,5, 4,0,1
        ];
        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(verts, 3));
        geo.setIndex(idx);
        geo.computeVertexNormals();
        const mesh = new THREE.Mesh(geo, mat);
        mesh.castShadow = mesh.receiveShadow = true;
        bodyPivot.add(mesh);
        return mesh;
      };

      // Main hull: very long hood, compact cabin and a high, squared rear quarter.
      const lower = addPrism(3.62, 3.92, 7.65, .58, 1.33, 1.48, paint, .05);
      const nose = addPrism(3.26, 3.72, 2.85, 1.20, 1.48, 1.72, paint, -2.35);
      const rearDeck = addPrism(3.72, 3.90, 2.35, 1.24, 1.70, 1.82, paint, 2.52);
      const hood = addPrism(3.18, 3.48, 2.60, 1.48, 1.55, 1.72, paint, -2.22);

      // Cabin: narrow roof, steep windshield, long side glass and slanted C-pillars.
      const cabinBase = addPrism(3.18, 3.28, 3.15, 1.70, 2.24, 2.28, paint, .28);
      const cabinTop = addPrism(2.38, 2.72, 1.76, 2.18, 2.76, 2.72, paint, .12);
      const windshield = addBox(2.64, .82, .075, glass, 0, 2.36, -1.30, -.64);
      const rearGlass = addBox(2.56, .76, .075, glass, 0, 2.35, 1.38, .58);
      const roof = addBox(2.42, .16, 1.38, armor, 0, 2.80, .10);

      // Black side stripe.
      const stripeL = addBox(.055, .31, 5.95, stripeMat, -1.985, 1.47, .28);
      const stripeR = addBox(.055, .31, 5.95, stripeMat, 1.985, 1.47, .28);

      // Fender armor and side skirts.
      const armorL = addBox(.14, .62, 4.85, armor, -2.015, 1.14, .18, 0, 0, -.045);
      const armorR = addBox(.14, .62, 4.85, armor, 2.015, 1.14, .18, 0, 0, .045);
      addBox(.16, .38, 2.12, armor, -2.01, .90, -2.15);
      addBox(.16, .38, 2.12, armor, 2.01, .90, -2.15);
      addBox(.16, .38, 1.78, armor, -2.01, .90, 2.32);
      addBox(.16, .38, 1.78, armor, 2.01, .90, 2.32);

      // Heavy front and rear bumpers.
      const bumperFront = addBox(4.05, .30, .38, armor, 0, .82, -3.78);
      const bumperRear = addBox(3.95, .26, .34, armor, 0, .86, 3.74);
      addBox(3.15, .52, .14, dark, 0, 1.18, -3.66);

      // Hood scoop.
      addBox(1.15, .24, 1.05, dark, 0, 1.88, -1.98, -.05);
      addBox(.86, .18, .62, armor, 0, 1.98, -2.18, -.05);

      // Rectangular front lights.
      for (const x of [-1.20, 1.20]) {
        const lamp = addBox(.58, .29, .07, orangeLight, x, 1.24, -3.75);
        lamp.castShadow = false;
      }

      // Wheels with steel rims.
      const wheelGeo = new THREE.CylinderGeometry(.72, .72, .50, 20);
      const rimGeo = new THREE.CylinderGeometry(.40, .40, .515, 16);
      const tireInstances = new THREE.InstancedMesh(wheelGeo, rubber, 4);
      tireInstances.name = "VehicleTires";
      tireInstances.castShadow = true;
      tireInstances.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
      bodyPivot.add(tireInstances);
      const rimInstances = new THREE.InstancedMesh(rimGeo, steel, 4);
      rimInstances.name = "VehicleRims";
      rimInstances.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
      bodyPivot.add(rimInstances);
      const wheels = [];
      let wheelIndex = 0;
      for (const x of [-1.82, 1.82]) {
        for (const z of [-2.52, 2.55]) {
          const pivot = new THREE.Group();
          pivot.position.set(x, .72, z);
          bodyPivot.add(pivot);
          wheels.push({
            pivot,
            spin: 0,
            front: z < 0,
            index: wheelIndex++,
            tireInstances,
            rimInstances,
          });
        }
      }
      refreshWheelInstances(wheels);

      // Rivets across the visible armor panels.
      const rivetGeo = new THREE.SphereGeometry(.065, 8, 6);
      for (const side of [-1, 1]) {
        for (const z of [-2.7, -1.55, -.35, .90, 2.05, 3.00]) {
          const rivet = new THREE.Mesh(rivetGeo, steel);
          rivet.position.set(side * 2.09, 1.52, z);
          bodyPivot.add(rivet);
        }
      }

      // Windshield and side-window protection bars.
      for (let i = -2; i <= 2; i++) {
        addBox(2.95, .045, .055, armor, 0, 2.26 + i * .13, -1.285, -.53);
      }
      for (const side of [-1, 1]) {
        for (let i = -2; i <= 2; i++) {
          addBox(.05, .055, 1.58, armor, side * 1.62, 2.18 + i * .13, .20, 0, 0, Math.PI / 2);
        }
      }

      // Roof weapon platform.
      const turret = new THREE.Group();
      turret.position.set(0, 2.92, -.18);
      bodyPivot.add(turret);

      const turretBase = new THREE.Mesh(new THREE.BoxGeometry(1.72, .42, 1.34), armor);
      turretBase.position.y = .16;
      turretBase.castShadow = true;
      turret.add(turretBase);

      const gunHousing = new THREE.Mesh(new THREE.BoxGeometry(.82, .42, .92), gunMat);
      gunHousing.position.set(-.42, .52, -.40);
      gunHousing.castShadow = true;
      turret.add(gunHousing);

      for (const x of [-.58, -.30]) {
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(.07, .095, 1.78, 10), gunMat);
        barrel.rotation.x = Math.PI / 2;
        barrel.position.set(x, .55, -1.18);
        barrel.castShadow = true;
        turret.add(barrel);
        for (let j = 0; j < 4; j++) {
          const collar = new THREE.Mesh(new THREE.TorusGeometry(.09, .018, 6, 12), steel);
          collar.rotation.x = Math.PI / 2;
          collar.position.set(x, .55, -1.0 + j * .27);
          turret.add(collar);
        }
      }

      const muzzleL = new THREE.Object3D();
      muzzleL.position.set(-.58, .55, -2.08);
      turret.add(muzzleL);
      const muzzleR = new THREE.Object3D();
      muzzleR.position.set(-.30, .55, -2.08);
      turret.add(muzzleR);

      // Eight-tube rocket pod, matching the reference silhouette.
      const rocketPod = new THREE.Group();
      rocketPod.position.set(.28, .55, .18);
      rocketPod.scale.set(.5, .5, 1);
      turret.add(rocketPod);
      const podBack = new THREE.Mesh(new THREE.BoxGeometry(1.40, .82, 1.08), armor);
      podBack.position.z = .24;
      podBack.castShadow = true;
      rocketPod.add(podBack);
      for (const y of [-.22, .22]) {
        for (const x of [-.48, -.16, .16, .48]) {
          const tube = new THREE.Mesh(new THREE.CylinderGeometry(.135, .16, 1.15, 14, 1, true), gunMat);
          tube.rotation.x = Math.PI / 2;
          tube.position.set(x, y, -.38);
          tube.castShadow = true;
          rocketPod.add(tube);
          const lip = new THREE.Mesh(new THREE.TorusGeometry(.145, .025, 7, 16), steel);
          lip.rotation.x = Math.PI / 2;
          lip.position.set(x, y, -.96);
          rocketPod.add(lip);
        }
      }

      const rocketMount = new THREE.Object3D();
      rocketMount.position.set(.28, 3.47, -1.20);
      bodyPivot.add(rocketMount);

      // Player-only green number marking.
      if (!enemy) {
        const c = document.createElement("canvas");
        c.width = 256; c.height = 128;
        const ctx = c.getContext("2d");
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.font = "italic 900 86px Impact, sans-serif";
        ctx.fillStyle = "#49e32b";
        ctx.strokeStyle = "#183e12";
        ctx.lineWidth = 8;
        ctx.strokeText("432", 24, 94);
        ctx.fillText("432", 24, 94);
        const tex = new THREE.CanvasTexture(c);
        tex.colorSpace = THREE.SRGBColorSpace;
        const numberMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false });
        const number = new THREE.Mesh(new THREE.PlaneGeometry(1.62, .82), numberMat);
        number.position.set(-2.10, 1.72, 2.62);
        number.rotation.y = -Math.PI / 2;
        bodyPivot.add(number);
      }

      // Enemy archetypes get clearly different silhouettes while sharing the same
      // lightweight base vehicle and damage system.
      if (enemy) {
        const accentColor = new THREE.Color(color).offsetHSL(rand(-.08, .08), rand(.06, .18), rand(.08, .20));
        const accent = new THREE.MeshStandardMaterial({
          color: accentColor,
          roughness: .62,
          metalness: .56,
        });

        const addSpike = (x, y, z, length = .9, radius = .15, rx = -Math.PI / 2, ry = 0, rz = 0) => {
          const spike = new THREE.Mesh(new THREE.ConeGeometry(radius, length, 7), steel);
          spike.position.set(x, y, z);
          spike.rotation.set(rx, ry, rz);
          spike.castShadow = true;
          bodyPivot.add(spike);
          return spike;
        };

        if (variant === "interceptor") {
          bodyPivot.scale.set(1.04, .86, .96);
          addBox(4.18, .12, .72, armor, 0, .62, -3.82, .08);
          addBox(3.55, .16, .42, accent, 0, 2.53, 3.36);
          for (const x of [-1.58, 1.58]) {
            addBox(.12, .62, .18, steel, x, 2.22, 3.34, 0, 0, x < 0 ? -.12 : .12);
            const exhaust = new THREE.Mesh(new THREE.CylinderGeometry(.10, .13, 1.0, 10), gunMat);
            exhaust.rotation.x = Math.PI / 2;
            exhaust.position.set(x, .82, 3.73);
            exhaust.castShadow = true;
            bodyPivot.add(exhaust);
          }
        } else if (variant === "bruiser") {
          bodyPivot.scale.set(1.13, 1.07, 1.04);
          addBox(4.35, .68, .30, armor, 0, 1.02, -3.94);
          addBox(2.55, .18, 1.72, armor, 0, 2.98, .18);
          for (const side of [-1, 1]) {
            addBox(.30, .88, 3.15, armor, side * 2.18, 1.35, .28, 0, 0, side * .035);
            addSpike(side * 1.34, 1.10, -4.25, 1.20, .20);
          }
          addSpike(0, 1.12, -4.42, 1.42, .24);
        } else if (variant === "gunner") {
          bodyPivot.scale.set(.99, 1.02, 1.00);
          addBox(1.15, .62, 1.08, accent, -1.12, 3.16, .35);
          addBox(1.15, .62, 1.08, accent, 1.12, 3.16, .35);
          addBox(2.36, .55, .16, armor, 0, 3.38, -.70, -.08);
          for (const x of [-.88, .88]) {
            const extraBarrel = new THREE.Mesh(new THREE.CylinderGeometry(.075, .105, 2.05, 10), gunMat);
            extraBarrel.rotation.x = Math.PI / 2;
            extraBarrel.position.set(x, 3.38, -1.72);
            extraBarrel.castShadow = true;
            bodyPivot.add(extraBarrel);
          }
        } else if (variant === "boss") {
          bodyPivot.scale.set(1.06, 1.05, 1.06);
          addBox(4.55, .82, .36, armor, 0, 1.08, -4.02);
          addBox(3.35, .28, 2.05, accent, 0, 3.12, .12);
          for (const side of [-1, 1]) {
            addBox(.32, 1.02, 3.65, armor, side * 2.22, 1.44, .08);
            addSpike(side * 1.45, 1.18, -4.46, 1.55, .26);
            addSpike(side * .48, 1.32, -4.50, 1.36, .22);
          }
        } else {
          // Raider: improvised spikes and asymmetrical scrap armor.
          addBox(1.20, .42, 1.85, accent, 1.72, 1.72, .42, 0, 0, .06);
          addSpike(-1.18, 1.06, -4.18, 1.05, .18);
          addSpike(0, 1.08, -4.26, 1.18, .20);
          addSpike(1.18, 1.06, -4.18, 1.05, .18);
        }
      }

      const damage = {
        paint,
        glass,
        basePaint: new THREE.Color(color),
        burnedPaint: new THREE.Color(0x211713),
        baseRoughness: paint.roughness,
        baseMetalness: paint.metalness,
        hood,
        cabin: cabinBase,
        roof,
        bumperFront,
        bumperRear,
        windshield,
        rearGlass,
        armorL,
        armorR,
        decals: [],
        seed: rand(-1, 1),
        // Snapshot of factory transforms so damage warping stays relative.
        origXf: {
          hoodY: hood.position.y,    hoodRX: hood.rotation.x,     hoodRZ: hood.rotation.z,
          cabinRZ: cabinBase.rotation.z,
          roofRZ: roof.rotation.z,
          bfY: bumperFront.position.y, bfRY: bumperFront.rotation.y,
          brRZ: bumperRear.rotation.z,
          alRZ: armorL.rotation.z,
          arRZ: armorR.rotation.z,
        },
      };

      if (enemy) {
        const scorchMaterial = new THREE.MeshStandardMaterial({
          color: 0x24130f,
          roughness: 1,
          metalness: .12,
          transparent: true,
          opacity: .9,
          polygonOffset: true,
          polygonOffsetFactor: -2,
        });
        const rustMaterial = new THREE.MeshStandardMaterial({ color: 0x4b2015, roughness: .94, metalness: .3 });
        const crackMaterial = new THREE.MeshBasicMaterial({ color: 0xd7d0bd, transparent: true, opacity: .72, depthWrite: false });

        const hoodScorch = new THREE.Mesh(new THREE.BoxGeometry(1.28,.025,1.2), scorchMaterial);
        hoodScorch.position.set(.48,1.81,-2.22);
        hoodScorch.rotation.y = .24;
        hoodScorch.visible = false;
        bodyPivot.add(hoodScorch);
        damage.decals.push({ mesh: hoodScorch, threshold: .18 });

        const leftScrape = new THREE.Mesh(new THREE.BoxGeometry(.035,.22,1.95), rustMaterial);
        leftScrape.position.set(-2.10,1.35,.15);
        leftScrape.rotation.x = .08;
        leftScrape.visible = false;
        bodyPivot.add(leftScrape);
        damage.decals.push({ mesh: leftScrape, threshold: .34 });

        const rightScrape = leftScrape.clone();
        rightScrape.position.x = 2.10;
        rightScrape.rotation.x = -.06;
        rightScrape.visible = false;
        bodyPivot.add(rightScrape);
        damage.decals.push({ mesh: rightScrape, threshold: .52 });

        const roofScorch = new THREE.Mesh(new THREE.BoxGeometry(.92,.025,.72), scorchMaterial.clone());
        roofScorch.position.set(-.42,2.95,.28);
        roofScorch.rotation.y = -.35;
        roofScorch.visible = false;
        bodyPivot.add(roofScorch);
        damage.decals.push({ mesh: roofScorch, threshold: .62 });

        const cracks = new THREE.Group();
        cracks.position.set(.35,2.28,-1.30);
        cracks.rotation.x = -.53;
        cracks.visible = false;
        for (let i = 0; i < 6; i++) {
          const crack = new THREE.Mesh(new THREE.BoxGeometry(.018,.018,rand(.28,.62)), crackMaterial);
          crack.rotation.y = rand(-1.15,1.15);
          crack.position.set(rand(-.16,.16),rand(-.10,.10),0);
          cracks.add(crack);
        }
        bodyPivot.add(cracks);
        damage.decals.push({ mesh: cracks, threshold: .44 });

        const ram = new THREE.Mesh(new THREE.ConeGeometry(.24,1.2,6), steel);
        ram.rotation.x = -Math.PI/2;
        ram.position.set(0,.92,-4.10);
        bodyPivot.add(ram);
      }

      batchVehicleMeshes(bodyPivot, [
        ...wheels.map(wheel => wheel.pivot),
        tireInstances,
        rimInstances,
        hood,
        cabinBase,
        roof,
        bumperFront,
        bumperRear,
        windshield,
        rearGlass,
        armorL,
        armorR,
        ...damage.decals.map(decal => decal.mesh),
      ]);
      return { group:car, bodyPivot, wheels, muzzleL, muzzleR, rocketMount, damage };
    }


    function createCockpit() {
      const cockpit = new THREE.Group();
      cockpit.visible = false;
      // The camera represents the driver's head, not the vehicle centerline.
      // Shift the camera-mounted interior so the steering wheel is directly
      // ahead and the passenger-side A-pillar stays outside the view.
      cockpit.position.x = .50;
      cockpit.position.y = -.12;

      const vinyl = new THREE.MeshStandardMaterial({ color: 0x171210, roughness: .9, metalness: .05 });
      const trim = new THREE.MeshStandardMaterial({ color: 0x8c6a49, roughness: .45, metalness: .55 });
      const paint = new THREE.MeshStandardMaterial({ color: 0x7f1f18, roughness: .32, metalness: .68 });
      const glow = new THREE.MeshBasicMaterial({ color: 0xffc15a });
      const glass = new THREE.MeshStandardMaterial({ color: 0x17242b, roughness: .16, metalness: .24 });

      const dash = new THREE.Mesh(new THREE.BoxGeometry(3.7, .54, .92), vinyl);
      dash.position.set(.28, -.63, -1.28);
      dash.rotation.x = -.08;
      cockpit.add(dash);

      const dashTop = new THREE.Mesh(new THREE.BoxGeometry(3.85, .17, 1.18), vinyl);
      dashTop.position.set(.28, -.38, -1.43);
      dashTop.rotation.x = -.16;
      cockpit.add(dashTop);

      const hoodGeometry = new THREE.BufferGeometry();
      hoodGeometry.setAttribute("position", new THREE.Float32BufferAttribute([
        -2.78,  .09,  2.05,
         3.33,  .09,  2.05,
         3.10, -.10, -2.05,
        -2.55, -.10, -2.05,
        -2.78, -.10,  2.05,
         3.33, -.10,  2.05,
         3.10, -.20, -2.05,
        -2.55, -.20, -2.05,
      ], 3));
      hoodGeometry.setIndex([
        0, 1, 2, 0, 2, 3,
        4, 6, 5, 4, 7, 6,
        0, 4, 5, 0, 5, 1,
        3, 2, 6, 3, 6, 7,
        0, 3, 7, 0, 7, 4,
        1, 5, 6, 1, 6, 2,
      ]);
      hoodGeometry.computeVertexNormals();
      const hood = new THREE.Mesh(hoodGeometry, paint);
      hood.position.set(.55, -.64, -3.45);
      cockpit.add(hood);

      // Low, forward-facing hood scoop centered on the vehicle.
      const scoopGeometry = new THREE.BufferGeometry();
      scoopGeometry.setAttribute("position", new THREE.Float32BufferAttribute([
        -.42, 0,  .65,
         .42, 0,  .65,
         .42, 0, -.65,
        -.42, 0, -.65,
        -.34, .07,  .52,
         .34, .07,  .52,
         .34, .20, -.65,
        -.34, .20, -.65,
      ], 3));
      scoopGeometry.setIndex([
        0, 1, 5, 0, 5, 4,
        4, 5, 6, 4, 6, 7,
        0, 4, 7, 0, 7, 3,
        1, 2, 6, 1, 6, 5,
        3, 7, 6, 3, 6, 2,
      ]);
      scoopGeometry.computeVertexNormals();
      const hoodScoop = new THREE.Mesh(scoopGeometry, vinyl);
      hoodScoop.position.set(.55, -.58, -2.85);
      cockpit.add(hoodScoop);
      const scoopOpening = new THREE.Mesh(
        new THREE.BoxGeometry(.66, .13, .025),
        new THREE.MeshBasicMaterial({ color: 0x080706 })
      );
      scoopOpening.position.set(.55, -.48, -3.51);
      cockpit.add(scoopOpening);

      // Hood-mounted ring sight inspired by classic 1970s vehicular combat
      // cockpits. Offset against the camera-mounted cockpit group so the
      // sight sits exactly on the vehicle's forward firing axis.
      const sight = new THREE.Group();
      sight.position.set(-.50, .15, -2.15);
      cockpit.add(sight);
      const sightMetal = new THREE.MeshStandardMaterial({
        color: 0x332a24,
        roughness: .38,
        metalness: .82,
      });
      const sightRing = new THREE.Mesh(new THREE.TorusGeometry(.14, .012, 6, 32), sightMetal);
      sight.add(sightRing);
      const sightPost = new THREE.Mesh(new THREE.BoxGeometry(.035, .58, .045), sightMetal);
      sightPost.position.y = -.29;
      sight.add(sightPost);

      // Windshield frame and rear-view mirror.
      const pillarBlack = new THREE.MeshStandardMaterial({
        color: 0x080808,
        roughness: .72,
        metalness: .38,
      });
      for (const x of [-1.42, 1.86]) {
        const pillar = new THREE.Mesh(new THREE.BoxGeometry(.13, 2.1, .16), pillarBlack);
        pillar.position.set(x, .27, -1.18);
        pillar.rotation.set(.20, 0, x < 0 ? .28 : -.28);
        cockpit.add(pillar);
      }
      const topFrame = new THREE.Mesh(new THREE.BoxGeometry(3.42, .13, .16), trim);
      topFrame.position.set(.22, 1.18, -1.18);
      cockpit.add(topFrame);
      mirrorRenderTarget = new THREE.WebGLRenderTarget(512, 128, {
        minFilter: THREE.LinearFilter,
        magFilter: THREE.LinearFilter,
        depthBuffer: true,
        stencilBuffer: false,
      });
      mirrorRenderTarget.texture.colorSpace = THREE.SRGBColorSpace;
      mirrorRenderTarget.texture.wrapS = THREE.RepeatWrapping;
      mirrorRenderTarget.texture.repeat.x = -1;
      mirrorRenderTarget.texture.offset.x = 1;
      mirrorCamera = new THREE.PerspectiveCamera(48, 4, .35, 1400);

      const mirrorStem = new THREE.Mesh(new THREE.BoxGeometry(.06, .50, .06), pillarBlack);
      mirrorStem.position.set(.05, 1.02, -1.04);
      cockpit.add(mirrorStem);
      const mirrorFrame = new THREE.Mesh(new THREE.BoxGeometry(1.15, .34, .08), pillarBlack);
      mirrorFrame.position.set(.05, .68, -1.02);
      cockpit.add(mirrorFrame);
      mirrorSurface = new THREE.Mesh(
        new THREE.PlaneGeometry(1.04, .25),
        new THREE.MeshBasicMaterial({ map: mirrorRenderTarget.texture, toneMapped: false })
      );
      mirrorSurface.position.set(.05, .68, -.972);
      cockpit.add(mirrorSurface);

      // Driver-side door. Keep its inner face away from the camera's near
      // plane so the lower-left bodywork reads as a complete door.
      const doorPanel = new THREE.Mesh(new THREE.BoxGeometry(.24, 1.02, 2.65), paint);
      doorPanel.position.set(-1.62, -.82, -.04);
      cockpit.add(doorPanel);
      const doorInset = new THREE.Mesh(new THREE.BoxGeometry(.045, .52, 1.72), vinyl);
      doorInset.position.set(-1.485, -.79, .05);
      cockpit.add(doorInset);
      const windowSill = new THREE.Mesh(new THREE.BoxGeometry(.34, .16, 2.72), paint);
      windowSill.position.set(-1.57, -.27, -.08);
      cockpit.add(windowSill);
      const doorHandle = new THREE.Mesh(new THREE.BoxGeometry(.055, .085, .42), trim);
      doorHandle.position.set(-1.445, -.57, -.28);
      cockpit.add(doorHandle);

      // Gauge cluster.
      function addGauge(x, y, radius) {
        const bezel = new THREE.Mesh(new THREE.TorusGeometry(radius, .016, 8, 28), trim);
        bezel.position.set(x, y, -.79);
        cockpit.add(bezel);
        const face = new THREE.Mesh(new THREE.CircleGeometry(radius * .88, 24), new THREE.MeshBasicMaterial({ color: 0x191612 }));
        face.position.set(x, y, -.805);
        cockpit.add(face);
        for (let i = 0; i < 9; i++) {
          const a = lerp(-2.25, 2.25, i / 8);
          const tick = new THREE.Mesh(new THREE.BoxGeometry(.018, .09, .014), glow);
          tick.position.set(x + Math.sin(a) * radius * .67, y + Math.cos(a) * radius * .67, -.78);
          tick.rotation.z = -a;
          cockpit.add(tick);
        }
        const pivot = new THREE.Group();
        pivot.position.set(x, y, -.78);
        const needle = new THREE.Mesh(new THREE.BoxGeometry(.025, radius * .66, .025), glow);
        needle.position.y = radius * .33;
        pivot.add(needle);
        cockpit.add(pivot);
        return pivot;
      }

      const speedNeedle = addGauge(-.74, -.46, .17);
      const rpmNeedle = addGauge(-.18, -.46, .155);
      speedNeedle.rotation.z = 2.25;
      rpmNeedle.rotation.z = 2.25;

      // Slim, low-set steering wheel that leaves more of the road visible.
      const wheelTilt = new THREE.Group();
      wheelTilt.position.set(-.48, -.45, -.64);
      wheelTilt.rotation.x = -.22;
      cockpit.add(wheelTilt);
      const wheelTurn = new THREE.Group();
      wheelTilt.add(wheelTurn);
      const rim = new THREE.Mesh(new THREE.TorusGeometry(.43, .032, 8, 40), vinyl);
      wheelTurn.add(rim);
      const innerRim = new THREE.Mesh(new THREE.TorusGeometry(.15, .022, 8, 32), trim);
      wheelTurn.add(innerRim);
      const hub = new THREE.Mesh(new THREE.CylinderGeometry(.10, .10, .045, 24), vinyl);
      hub.rotation.x = Math.PI / 2;
      wheelTurn.add(hub);
      for (const side of [-1, 1]) {
        const spoke = new THREE.Mesh(new THREE.BoxGeometry(.045, .24, .035), trim);
        spoke.position.set(side * .238, .138, 0);
        spoke.rotation.z = -side * Math.PI / 3;
        wheelTurn.add(spoke);
      }

      const column = new THREE.Mesh(new THREE.CylinderGeometry(.07, .09, .62, 10), trim);
      column.position.set(-.48, -.55, -.93);
      column.rotation.x = Math.PI / 2 + .22;
      cockpit.add(column);

      // Small center console lights.
      for (let i = 0; i < 4; i++) {
        const lamp = new THREE.Mesh(new THREE.CircleGeometry(.035, 12), new THREE.MeshBasicMaterial({ color: i < 2 ? 0xff5c35 : 0x66d7ff }));
        lamp.position.set(.18 + i * .12, -.69, -.73);
        cockpit.add(lamp);
      }

      const cabinLight = new THREE.PointLight(0xff9a55, .65, 4, 2);
      cabinLight.position.set(0, .15, -.35);
      cockpit.add(cabinLight);

      batchVehicleMeshes(cockpit, [
        wheelTurn,
        speedNeedle,
        rpmNeedle,
        mirrorSurface,
      ]);
      camera.add(cockpit);
      return { cockpit, wheelTurn, speedNeedle, rpmNeedle };
    }

    function createPlayer() {
      const c = createCar(0x7f1f18, false);
      player.group = c.group;
      player.bodyPivot = c.bodyPivot;
      player.wheels = c.wheels;
      player.muzzleL = c.muzzleL;
      player.muzzleR = c.muzzleR;
      player.rocketMount = c.rocketMount;
      player.damage = c.damage;
      alignVehicleToTerrain(player, true);
      player.group.position.copy(player.pos);
      scene.add(player.group);
      const cockpit = createCockpit();
      player.cockpit = cockpit.cockpit;
      player.steeringWheel = cockpit.wheelTurn;
      player.speedNeedle = cockpit.speedNeedle;
      player.rpmNeedle = cockpit.rpmNeedle;
    }

    function randomEnemyPaint(type) {

    function unlockedEnemyTypes() {
      const types = ["raider", "interceptor"];
      if (wave >= 2) types.push("gunner");
      if (wave >= 3) types.push("bruiser");
      return types;
